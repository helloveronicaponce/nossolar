function calcularDadosFinanceiros(){
  const lancamentos=rows(); // Lançamentos do mês
  const saldoInicial=getSI(mes);

  let entradas=0,saidas=0,cartoes=0,parcelados=0;

  // Processar lançamentos (incluindo parcelados)
  lancamentos.forEach(l=>{
    if(l.tipo==='in')entradas+=l.valor||0;
    if(l.tipo==='out')saidas+=l.valor||0;
    if(l.tipo==='parcelado'){
      // Parcelados são tratados como saídas
      parcelados+=l.valor||0;
      saidas+=l.valor||0;
    }
  });

  // Processar cartões (faturas)
  const faturasDoMes=(D._faturas||{})[mes]||{};
  Object.values(faturasDoMes).forEach(fatura=>{
    cartoes+=fatura||0;
  });

  const saldoAtual=saldoInicial+entradas-saidas-cartoes;
  const resultado=entradas-saidas-cartoes;

  return{saldoInicial,entradas,saidas,cartoes,parcelados,saldoAtual,resultado};
}

function renderGraficoEntradasSaidas(){
  const graficoEl=document.getElementById('grafico-entradas-saidas');
  if(!graficoEl)return;

  // Pegar filtros
  const periodo=document.getElementById('grafico-periodo')?.value||'todos';
  const tipoFiltro=document.getElementById('grafico-tipo')?.value||'ambos';

  // Calcular entradas vs saídas por mês
  const mesesData={};

  // Processar lançamentos de todos os meses (incluindo parcelados)
  Object.entries(D).forEach(([m,lancamentos])=>{
    if(!m.includes('-')||!Array.isArray(lancamentos))return;

    let ent=0,sai=0;
    lancamentos.forEach(l=>{
      if(l.tipo==='in')ent+=l.valor||0;
      if(l.tipo==='out'||l.tipo==='parcelado')sai+=l.valor||0;
    });

    mesesData[m]={entradas:ent,saidas:sai};
  });

  // Adicionar cartões (faturas) aos dados
  Object.entries(D._faturas||{}).forEach(([m,cartoes])=>{
    if(!m.includes('-'))return;
    if(!mesesData[m])mesesData[m]={entradas:0,saidas:0};
    const totalCartoes=Object.values(cartoes||{}).reduce((s,v)=>s+(v||0),0);
    mesesData[m].saidas+=(totalCartoes||0);
  });

  // TODOS os meses ordenados
  const allMeses=Object.keys(mesesData).sort();
  if(allMeses.length===0){
    graficoEl.innerHTML='<div style="color:var(--t3)">Sem dados de lançamentos</div>';
    return;
  }

  // Aplicar filtro de período
  let meses;
  if(periodo==='todos')meses=allMeses;
  else if(periodo==='3')meses=allMeses.slice(-3);
  else if(periodo==='6')meses=allMeses.slice(-6);
  else if(periodo==='12')meses=allMeses.slice(-12);
  else meses=allMeses;

  // Criar gráfico com scroll horizontal se muitos meses
  const width=Math.max(800, meses.length*60);
  const height=220;
  const padding=40;
  const chartWidth=width-2*padding;
  const chartHeight=height-2*padding;
  const stepX=chartWidth/(meses.length-1||1);

  const maxValor=Math.max(...meses.map(m=>Math.max(mesesData[m].entradas,mesesData[m].saidas)));
  const escala=1/maxValor;

  let svg=`<svg width="${width}" height="${height}" style="overflow:visible">`;

  // Grid
  for(let i=0;i<=4;i++){
    const y=padding+i*chartHeight/4;
    const valor=Math.round(maxValor*(4-i)/4);
    svg+=`<line x1="${padding}" y1="${y}" x2="${width-padding}" y2="${y}" stroke="var(--b)" stroke-width="1" stroke-dasharray="4"/>`;
    svg+=`<text x="${padding-5}" y="${y+3}" font-size="10" fill="var(--t3)" text-anchor="end">${fv(valor)}</text>`;
  }

  // Linhas e pontos
  const anoAtual=new Date().getFullYear().toString();
  meses.forEach((m,i)=>{
    const x=padding+i*stepX;
    const ehAnoAtual=m.startsWith(anoAtual);

    // Destacar background para meses do ano atual
    if(ehAnoAtual){
      svg+=`<rect x="${x-stepX/2.5}" y="${padding}" width="${stepX*0.8}" height="${chartHeight}" fill="rgba(29,185,84,0.08)" rx="4"/>`;
    }

    const yEnt=padding+chartHeight*(1-(mesesData[m].entradas*escala));
    const ySai=padding+chartHeight*(1-(mesesData[m].saidas*escala));

    if(i>0){
      const xPrev=padding+(i-1)*stepX;
      const yEntPrev=padding+chartHeight*(1-(mesesData[meses[i-1]].entradas*escala));
      const ySaiPrev=padding+chartHeight*(1-(mesesData[meses[i-1]].saidas*escala));

      // Desenhar linhas conforme filtro
      if(tipoFiltro==='ambos'||tipoFiltro==='entradas')
        svg+=`<line x1="${xPrev}" y1="${yEntPrev}" x2="${x}" y2="${yEnt}" stroke="var(--g)" stroke-width="2" opacity="0.8"/>`;
      if(tipoFiltro==='ambos'||tipoFiltro==='saidas')
        svg+=`<line x1="${xPrev}" y1="${ySaiPrev}" x2="${x}" y2="${ySai}" stroke="var(--r)" stroke-width="2" opacity="0.8"/>`;
    }

    // Desenhar pontos conforme filtro
    if(tipoFiltro==='ambos'||tipoFiltro==='entradas')
      svg+=`<circle cx="${x}" cy="${yEnt}" r="3" fill="var(--g)"/>`;
    if(tipoFiltro==='ambos'||tipoFiltro==='saidas')
      svg+=`<circle cx="${x}" cy="${ySai}" r="3" fill="var(--r)"/>`;

    svg+=`<text x="${x}" y="${height-10}" font-size="11" fill="${ehAnoAtual?'var(--g)':'var(--t2)'}" text-anchor="middle" font-weight="${ehAnoAtual?'700':'600'}">${m}</text>`;
  });

  // Legenda dinâmica
  if(tipoFiltro==='ambos'||tipoFiltro==='entradas')
    svg+=`<text x="${padding}" y="${20}" font-size="11" fill="var(--g)" font-weight="600">● Entradas</text>`;
  if(tipoFiltro==='ambos'||tipoFiltro==='saidas')
    svg+=`<text x="${tipoFiltro==='ambos'?padding+130:padding}" y="${20}" font-size="11" fill="var(--r)" font-weight="600">● Saídas</text>`;

  svg+=`</svg>`;

  // Adicionar tooltips
  const container=document.createElement('div');
  container.style.cssText='width:100%;overflow-x:auto;position:relative';

  const svgWrapper=document.createElement('div');
  svgWrapper.innerHTML=svg;
  svgWrapper.style.cssText='position:relative;display:inline-block';

  const tooltip=document.createElement('div');
  tooltip.style.cssText='position:absolute;background:rgba(0,0,0,0.85);color:#fff;padding:.5rem .75rem;border-radius:6px;font-size:12px;pointer-events:none;opacity:0;transition:opacity 0.2s;z-index:10;white-space:nowrap';
  tooltip.textContent='Passe o mouse sobre o gráfico';
  svgWrapper.appendChild(tooltip);

  svgWrapper.addEventListener('mousemove',(e)=>{
    const rect=svgWrapper.getBoundingClientRect();
    const mouseX=e.clientX-rect.left;
    const pointX=mouseX-padding;
    if(pointX<0||pointX>chartWidth){tooltip.style.opacity='0';return;}

    const idx=Math.round(pointX/stepX);
    if(idx<0||idx>=meses.length){tooltip.style.opacity='0';return;}

    const m=meses[idx];
    let tooltipText=m;
    if(tipoFiltro==='ambos'){
      tooltipText=`${m} | Ent: ${fv(mesesData[m].entradas)} | Saí: ${fv(mesesData[m].saidas)}`;
    } else if(tipoFiltro==='entradas'){
      tooltipText=`${m} | Entradas: ${fv(mesesData[m].entradas)}`;
    } else {
      tooltipText=`${m} | Saídas: ${fv(mesesData[m].saidas)}`;
    }
    tooltip.textContent=tooltipText;
    tooltip.style.left=(padding+idx*stepX-tooltip.offsetWidth/2)+'px';
    tooltip.style.top=(padding-30)+'px';
    tooltip.style.opacity='1';
  });

  svgWrapper.addEventListener('mouseleave',()=>{tooltip.style.opacity='0';});
  svgWrapper.addEventListener('touchmove',(e)=>{
    if(e.touches.length===0)return;
    const touch=e.touches[0];
    const rect=svgWrapper.getBoundingClientRect();
    const touchX=touch.clientX-rect.left;
    const pointX=touchX-padding;
    if(pointX<0||pointX>chartWidth){tooltip.style.opacity='0';return;}

    const idx=Math.round(pointX/stepX);
    if(idx<0||idx>=meses.length){tooltip.style.opacity='0';return;}

    const m=meses[idx];
    let tooltipText=m;
    if(tipoFiltro==='ambos'){
      tooltipText=`${m} | Ent: ${fv(mesesData[m].entradas)} | Saí: ${fv(mesesData[m].saidas)}`;
    } else if(tipoFiltro==='entradas'){
      tooltipText=`${m} | Entradas: ${fv(mesesData[m].entradas)}`;
    } else {
      tooltipText=`${m} | Saídas: ${fv(mesesData[m].saidas)}`;
    }
    tooltip.textContent=tooltipText;
    tooltip.style.left=(padding+idx*stepX-tooltip.offsetWidth/2)+'px';
    tooltip.style.top=(padding-30)+'px';
    tooltip.style.opacity='1';
  });

  svgWrapper.addEventListener('touchend',()=>{tooltip.style.opacity='0';});

  container.appendChild(svgWrapper);
  graficoEl.innerHTML='';
  graficoEl.appendChild(container);
}

/* ── TABLE DELEGATION (registrada 1x) ── */
function tbDelegate(ev){
  const chip=ev.target.closest('.chip');
  if(chip){ev.stopPropagation();toggleStatus({stopPropagation:()=>{},currentTarget:chip,clientX:ev.clientX,clientY:ev.clientY},chip.dataset.id);return;}
  const ddEl=ev.target.closest('.dd');
  if(ddEl){ev.stopPropagation();editDate({stopPropagation:()=>{},currentTarget:ddEl},ddEl.dataset.id);return;}
  const vd=ev.target.closest('.vd');
  if(vd){ev.stopPropagation();editVal({stopPropagation:()=>{},currentTarget:vd},vd.dataset.id);return;}
  const dn=ev.target.closest('.dn');
  if(dn){ev.stopPropagation();openModal(dn.dataset.id);return;}
  const del=ev.target.closest('.ib.del');
  if(del){ev.stopPropagation();delItem(del.dataset.id);return;}
  if(ev.target.closest('.row-cb'))return;
  if(isMob()){const row=ev.target.closest('[data-id]');if(row&&(row.classList.contains('tr')||row.style.display==='grid')){openModal(row.dataset.id);}}
}

async function init(){

  // Autenticação e carregamento de dados
  await checkAuth();
  if(document.getElementById('app-root').style.display!=='none'){
    try{
      await loadFromDB();

      if(isMob()){
        // Mobile: renderizar visão geral por padrão
        
        render();
        renderSide();
        renderSideGeral();
        const headerEl=document.getElementById('lanc-header-mes');
        if(headerEl)headerEl.textContent=MN[+mes.slice(5)-1];
      } else {
        // Desktop: renderizar abas
        
        render();
        renderSide();

        // Checar hash e renderizar página apropriada
        const hash=window.location.hash.slice(1)||'lancamentos';
        const validPages=['lancamentos','cartoes','visao-geral'];
        const pageToLoad=validPages.includes(hash)?hash:'lancamentos';

        
        await switchPage(pageToLoad);

        // Listener para mudanças de hash
        window.addEventListener('hashchange',()=>{
          const newHash=window.location.hash.slice(1)||'lancamentos';
          if(validPages.includes(newHash)){
            switchPage(newHash);
          }
        });

        // Mostrar onboarding se primeira vez
        if(!sessionStorage.getItem('onboarding-shown')){
          setTimeout(showOnboarding,500);
        }
      }
    }
    catch(e){}
  }
}

/* ── SISTEMA DE NOTIFICAÇÕES (TOAST) ── */
function toast(msg,tipo='success',duracao=3000){
  let container=document.getElementById('toast-container');
  if(!container){
    container=document.createElement('div');
    container.id='toast-container';
    document.body.appendChild(container);
  }

  const t=document.createElement('div');
  t.className='toast '+tipo;
  const emojis={success:'✅',error:'❌',warning:'⚠️',info:'ℹ️'};
  t.innerHTML=`<span>${emojis[tipo]}</span><span>${msg}</span>`;
  container.appendChild(t);

  setTimeout(()=>{
    t.classList.add('closing');
    setTimeout(()=>t.remove(),300);
  },duracao);
}
