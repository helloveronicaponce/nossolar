<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Nosso Lar - Painel Financeiro</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #1DB954;
      --danger: #FF4757;
      --warning: #FFA502;
      --bg: #F4F6F9;
      --white: #fff;
      --text: #1a1d23;
      --text-light: #6b7280;
      --border: #e5e7eb;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    .app { max-width: 1400px; margin: 0 auto; }
    .header {
      background: linear-gradient(135deg, var(--primary), #158a3e);
      color: var(--white);
      padding: 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 12px rgba(0,0,0,.1);
    }
    .header h1 { font-size: 28px; font-weight: 700; }
    .header-actions { display: flex; gap: 1rem; align-items: center; }
    .btn {
      padding: 0.6rem 1.2rem;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 14px;
    }
    .btn-primary { background: var(--primary); color: var(--white); }
    .btn-primary:hover { opacity: 0.9; }
    .btn-secondary { background: var(--white); color: var(--primary); border: 2px solid var(--primary); }
    .tabs {
      display: flex;
      gap: 0.5rem;
      padding: 2rem;
      border-bottom: 2px solid var(--border);
      background: var(--white);
    }
    .tab {
      padding: 0.75rem 1.5rem;
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      color: var(--text-light);
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab.active { color: var(--primary); border-bottom-color: var(--primary); }
    .content { padding: 2rem; display: none; }
    .content.active { display: block; }
    .card {
      background: var(--white);
      border-radius: 12px;
      padding: 1.5rem;
      border: 1px solid var(--border);
      margin-bottom: 1.5rem;
      box-shadow: 0 2px 8px rgba(0,0,0,.05);
    }
    .card h2 { font-size: 20px; margin-bottom: 1rem; color: var(--text); }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem; margin-bottom: 1.5rem; }
    .card-cartao {
      background: var(--white);
      border-left: 4px solid var(--primary);
      border-radius: 8px;
      padding: 1.5rem;
      margin-bottom: 1rem;
    }
    .card-cartao h3 { font-size: 16px; margin-bottom: 1rem; }
    .card-row { display: flex; justify-content: space-between; margin-bottom: 0.5rem; font-size: 14px; }
    .card-row .label { color: var(--text-light); }
    .card-row .value { font-weight: 600; color: var(--text); }
    .table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
    .table thead { background: var(--bg); }
    .table th { padding: 1rem; text-align: left; font-weight: 600; border-bottom: 2px solid var(--border); }
    .table td { padding: 1rem; border-bottom: 1px solid var(--border); }
    .login-screen { display: flex; align-items: center; justify-content: center; height: 100vh; background: linear-gradient(135deg, var(--primary), #158a3e); }
    .login-box { background: var(--white); padding: 2rem; border-radius: 12px; width: 90%; max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,.3); text-align: center; }
    .login-box h1 { font-size: 28px; margin-bottom: 1rem; color: var(--primary); }
    .login-box p { color: var(--text-light); margin-bottom: 1.5rem; }
    .form-group { margin-bottom: 1.5rem; }
    .form-group input { width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; font-family: inherit; }
    .hidden { display: none !important; }
    .text-danger { color: var(--danger); }
    .text-success { color: var(--primary); }
    .text-muted { color: var(--text-light); }
  </style>
</head>
<body>

<div id="login-screen" class="login-screen">
  <div class="login-box">
    <h1>💰 Nosso Lar</h1>
    <p>Painel Financeiro Pessoal</p>
    <div class="form-group">
      <input type="email" id="login-email" placeholder="Seu e-mail" />
    </div>
    <button id="login-btn" class="btn btn-primary" style="width: 100%;">
      Enviar Link de Acesso
    </button>
    <div id="login-message" style="margin-top: 1rem; color: var(--text-light); font-size: 14px;"></div>
  </div>
</div>

<div id="app" class="hidden">
  <div class="header">
    <h1>💰 Nosso Lar</h1>
    <div class="header-actions">
      <span id="sync-status" style="font-size: 12px; opacity: 0.8;"></span>
      <button id="logout-btn" class="btn btn-secondary">Sair</button>
    </div>
  </div>

  <div class="app">
    <div class="tabs">
      <button class="tab active" data-tab="cartoes">💳 Cartões</button>
      <button class="tab" data-tab="lancamentos">📊 Lançamentos</button>
    </div>

    <div id="cartoes" class="content active">
      <div id="cartoes-container"></div>
    </div>

    <div id="lancamentos" class="content">
      <div id="lancamentos-container"></div>
    </div>
  </div>
</div>

<script>
const SB_URL = 'https://qwlegnebejakwwuntyrd.supabase.co';
const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF3bGVnbmViZWpha3d3dW50eXJkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2OTUxODYsImV4cCI6MjA5MTI3MTE4Nn0.lkYjF5xXwS_XW8Wi-p0YBBOxY7Bjs_HDw7PIWDTcPYQ';
const EDGE_URL = 'https://qwlegnebejakwwuntyrd.supabase.co/functions/v1/nosso-lar';

let sbClient = null;
let faturas = [];

function fv(v) { return (typeof v === 'number' ? v : 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }); }

function initSupabase() {
  sbClient = window.supabase.createClient(SB_URL, SB_ANON);
}

async function checkAuth() {
  try {
    const { data: { session } } = await sbClient.auth.getSession();
    if (session) {
      showApp();
      await loadFaturas();
    } else {
      showLogin();
    }
  } catch (err) {
    console.error('Auth error:', err);
    showLogin();
  }
}

async function login() {
  const email = document.getElementById('login-email').value.trim();
  if (!email) {
    showMessage('Digite seu e-mail', 'error');
    return;
  }

  const btn = document.getElementById('login-btn');
  btn.disabled = true;
  btn.textContent = 'Enviando...';

  try {
    const { error } = await sbClient.auth.signInWithOtp({
      email,
      options: { emailRedirectTo: window.location.origin + window.location.pathname }
    });

    if (error) {
      showMessage('Erro: ' + error.message, 'error');
    } else {
      showMessage('Link enviado! Verifique seu e-mail.', 'success');
      document.getElementById('login-email').value = '';
    }
  } catch (err) {
    showMessage('Erro: ' + err.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Enviar Link de Acesso';
  }
}

async function logout() {
  await sbClient.auth.signOut();
  showLogin();
}

async function loadFaturas() {
  try {
    updateSyncStatus('Carregando...');
    const { data: { session } } = await sbClient.auth.getSession();
    if (!session) return;

    const response = await fetch(EDGE_URL, {
      headers: { 'Authorization': `Bearer ${session.access_token}` }
    });

    if (response.ok) {
      const data = await response.json();
      console.log('📊 Dados recebidos:', data);

      // Extrair apenas as faturas (ignorar outros dados)
      faturas = [];
      for (const [key, value] of Object.entries(data)) {
        if (key.match(/^\d{4}-\d{2}$/) && Array.isArray(value)) {
          faturas.push(...value);
        }
      }

      console.log('✅ Total de faturas carregadas:', faturas.length);
      console.log('📅 Meses disponíveis:', [...new Set(faturas.map(f => f.mes_ref))].sort());

      renderCartoes();
      renderLancamentos();
      updateSyncStatus('✅ Sincronizado');
      setTimeout(() => updateSyncStatus(''), 3000);
    }
  } catch (err) {
    console.error('Load error:', err);
    updateSyncStatus('⚠️ Erro ao carregar');
  }
}

function renderCartoes() {
  const container = document.getElementById('cartoes-container');

  // Agrupar faturas por cartão
  const porCartao = {};
  faturas.forEach(f => {
    const cartao = f.cartao || 'Desconhecido';
    if (!porCartao[cartao]) {
      porCartao[cartao] = [];
    }
    porCartao[cartao].push(f);
  });

  let html = '<div class="card"><h2>💳 Cartões de Crédito</h2>';

  // Mostrar resumo geral
  const totalGeral = faturas.reduce((s, f) => s + (f.fatura_total || 0), 0);
  html += `<div class="card-row"><span class="label">Total em Faturas:</span><span class="value">${fv(totalGeral)}</span></div>`;
  html += `<div class="card-row"><span class="label">Quantidade de Faturas:</span><span class="value">${faturas.length}</span></div>`;
  html += '</div>';

  // Mostrar por cartão
  Object.entries(porCartao).forEach(([cartao, fats]) => {
    const total = fats.reduce((s, f) => s + (f.fatura_total || 0), 0);
    const meses = [...new Set(fats.map(f => f.mes_ref))].sort().reverse();

    html += `<div class="card-cartao">
      <h3>${cartao}</h3>
      <div class="card-row"><span class="label">Total:</span><span class="value">${fv(total)}</span></div>
      <div class="card-row"><span class="label">Faturas:</span><span class="value">${fats.length}</span></div>
      <div class="card-row"><span class="label">Meses:</span><span class="value">${meses.join(', ')}</span></div>
      <div style="margin-top: 1rem; font-size: 12px; color: var(--text-light);">
        ${fats.slice(0, 3).map(f => `${f.mes_ref}: ${fv(f.fatura_total)}`).join(' • ')}
      </div>
    </div>`;
  });

  container.innerHTML = html;
}

function renderLancamentos() {
  const container = document.getElementById('lancamentos-container');

  if (faturas.length === 0) {
    container.innerHTML = '<div class="card"><p style="color: var(--text-light);">Nenhuma fatura carregada</p></div>';
    return;
  }

  // Agrupar por mês
  const porMes = {};
  faturas.forEach(f => {
    const mes = f.mes_ref || 'Desconhecido';
    if (!porMes[mes]) porMes[mes] = [];
    porMes[mes].push(f);
  });

  let html = '<div class="card"><h2>📊 Faturas por Mês</h2>';

  Object.entries(porMes).sort((a, b) => b[0].localeCompare(a[0])).forEach(([mes, fats]) => {
    const total = fats.reduce((s, f) => s + (f.fatura_total || 0), 0);

    html += `<div style="margin-bottom: 2rem;">
      <h3 style="font-size: 16px; margin-bottom: 1rem;">${mes} - ${fv(total)}</h3>
      <table class="table">
        <thead>
          <tr>
            <th>Cartão</th>
            <th>Categoria</th>
            <th style="text-align: right;">Valor</th>
          </tr>
        </thead>
        <tbody>
          ${fats.map(f => `
            <tr>
              <td>${f.cartao || '—'}</td>
              <td>${f.categoria || '—'}</td>
              <td style="text-align: right;">${fv(f.fatura_total || 0)}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>`;
  });

  html += '</div>';
  container.innerHTML = html;
}

function showLogin() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').classList.add('hidden');
}

function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').classList.remove('hidden');
}

function showMessage(msg, type) {
  const el = document.getElementById('login-message');
  el.textContent = msg;
  el.style.color = type === 'error' ? 'var(--danger)' : 'var(--primary)';
  setTimeout(() => {
    el.textContent = '';
  }, 5000);
}

function updateSyncStatus(msg) {
  document.getElementById('sync-status').textContent = msg;
}

// Tabs
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    const tabName = tab.dataset.tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById(tabName).classList.add('active');
  });
});

// Init
document.addEventListener('DOMContentLoaded', () => {
  initSupabase();
  checkAuth();

  const loginBtn = document.getElementById('login-btn');
  if (loginBtn) {
    loginBtn.addEventListener('click', login);
  }

  const logoutBtn = document.getElementById('logout-btn');
  if (logoutBtn) {
    logoutBtn.addEventListener('click', logout);
  }
});
</script>

</body>
</html>
