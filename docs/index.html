<!-- GitHub Pages Refresh -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<meta http-equiv="Pragma" content="no-cache"/>
<meta http-equiv="Expires" content="0"/>
<title>Nosso Lar</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<meta name="theme-color" content="#1DB954"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Nosso Lar"/>
<link rel="apple-touch-icon" id="apple-icon" href=""/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  /* Light mode */
  --g:#1DB954;--gl:#e8f8ef;--gd:#158a3e;
  --r:#FF4757;--rl:#fff0f1;
  --a:#FFA502;--al:#fff8ee;
  --bg:#F4F6F9;--w:#fff;
  --t:#1a1d23;--t2:#6b7280;--t3:#757575;
  --b:#e5e7eb;--b2:#d1d5db;
  --sh:0 1px 4px rgba(0,0,0,.07),0 4px 16px rgba(0,0,0,.05);
  --overlay:rgba(0,0,0,.5)
}

@media(prefers-color-scheme:dark){
  :root{
    --bg:#0f1419;--w:#1a1f2e;
    --t:#f0f4f8;--t2:#cbd5e1;--t3:#94a3b8;
    --b:#334155;--b2:#475569;
    --sh:0 1px 4px rgba(0,0,0,.3),0 4px 16px rgba(0,0,0,.2);
    --overlay:rgba(0,0,0,.8);
    --gl:#164e3a;--rl:#7f1d1d;--al:#92400e
  }
}

body.dark-mode{
  --bg:#0f1419;--w:#1a1f2e;
  --t:#f0f4f8;--t2:#cbd5e1;--t3:#94a3b8;
  --b:#334155;--b2:#475569;
  --sh:0 1px 4px rgba(0,0,0,.3),0 4px 16px rgba(0,0,0,.2);
  --overlay:rgba(0,0,0,.8);
  --gl:#164e3a;--rl:#7f1d1d;--al:#92400e
}
body{font-family:Inter,sans-serif;background:var(--bg);color:var(--t);font-size:14px;line-height:1.6;min-height:100vh}

/* TOAST NOTIFICATIONS */
#toast-container{position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:10px;max-width:400px}
.toast{padding:12px 16px;background:var(--w);border-left:4px solid var(--g);border-radius:8px;box-shadow:0 4px 12px rgba(0,0,0,.15);animation:slideIn .3s ease-out;display:flex;align-items:center;gap:10px;font-size:13px;color:var(--t)}
.toast.success{border-left-color:var(--g)}
.toast.error{border-left-color:var(--r)}
.toast.warning{border-left-color:var(--a)}
.toast.info{border-left-color:#0070c0}
@keyframes slideIn{from{transform:translateX(400px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes slideOut{from{transform:translateX(0);opacity:1}to{transform:translateX(400px);opacity:0}}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.toast.closing{animation:slideOut .3s ease-out}

/* ── TOPBAR ── */
.top{background:var(--g);padding:0 2rem;padding-top:env(safe-area-inset-top,0px);display:flex;align-items:center;height:calc(64px + env(safe-area-inset-top,0px));position:sticky;top:0;z-index:50;gap:1.5rem;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.logo{font-size:17px;font-weight:800;color:#fff;margin-right:auto;letter-spacing:-.03em}
.mes{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);border-radius:8px;padding:.3rem .75rem;color:#fff;font-family:Inter,sans-serif;font-size:13px;cursor:pointer}
.mes option{background:#158a3e}
.nav-mes{position:relative;display:flex;align-items:center;gap:2px}
.nav-arr{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:6px;color:#fff;font-size:18px;line-height:1;width:26px;height:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;padding:0;font-family:Inter,sans-serif}
.nav-arr:hover{background:rgba(255,255,255,.3)}
.nav-arr:disabled{opacity:.3;cursor:default}
.nav-label{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);border-radius:8px;padding:.28rem .7rem;color:#fff;font-family:Inter,sans-serif;font-size:13px;font-weight:600;cursor:pointer;display:flex;gap:5px;align-items:baseline;white-space:nowrap;transition:background .15s;min-width:110px;justify-content:center}
.nav-label:hover{background:rgba(255,255,255,.3)}
#nav-mes-txt{font-size:13px;font-weight:700}
#nav-ano-txt{font-size:11px;font-weight:500;opacity:.8}
.nav-picker{position:absolute;top:calc(100% + 8px);left:50%;transform:translateX(-50%);background:#fff;border-radius:14px;box-shadow:0 8px 32px rgba(0,0,0,.18);padding:.75rem;z-index:200;min-width:240px;animation:fadeIn .12s ease}
.np-anos{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:.6rem;justify-content:center}
.np-ano{padding:.25rem .7rem;border-radius:8px;border:1.5px solid var(--b);background:var(--w);color:var(--t2);font-family:Inter,sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .12s}
.np-ano:hover{border-color:var(--g);color:var(--g)}
.np-ano.on{background:var(--g);border-color:var(--g);color:#fff}
.np-meses{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
.np-mes{padding:.3rem .2rem;border-radius:8px;border:1.5px solid var(--b);background:var(--w);color:var(--t2);font-family:Inter,sans-serif;font-size:11px;font-weight:600;cursor:pointer;text-align:center;transition:all .12s}
.np-mes:hover:not(:disabled){border-color:var(--g);color:var(--g)}
.np-mes.on{background:var(--g);border-color:var(--g);color:#fff}
.np-mes:disabled{opacity:.28;cursor:default}
.btn{padding:.6rem 1.3rem;border-radius:8px;border:1.5px solid var(--b2);background:var(--w);color:var(--t2);font-family:Inter,sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .25s cubic-bezier(.4,0,.2,1);display:flex;align-items:center;gap:.5rem;min-height:40px}
.btn:hover{border-color:var(--g);color:var(--g);background:rgba(29,185,84,.05);transform:translateY(-1px)}
.btn.g{background:var(--g);border-color:var(--g);color:#fff;font-weight:700;box-shadow:0 2px 8px rgba(29,185,84,.3)}
.btn.g:hover{box-shadow:0 4px 16px rgba(29,185,84,.45);transform:translateY(-2px)}

/* ── LAYOUT ── */
.lay{display:grid;grid-template-columns:1fr 300px;gap:1.5rem;padding:1.5rem 1.75rem;max-width:1200px;margin:0 auto}
.main{display:flex;flex-direction:column;gap:1.5rem}
.side{display:flex;flex-direction:column;gap:1.5rem}
.card{background:var(--w);border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.08),0 4px 12px rgba(0,0,0,.04);padding:1.5rem;border:1px solid rgba(229,231,235,.5)}

/* ── SALDO BAR ── */
.sbar{background:var(--w);border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.08),0 4px 12px rgba(0,0,0,.04);padding:1.25rem;display:grid;grid-template-columns:auto 1px auto 1px auto 1px auto 1px auto;align-items:center;gap:1.25rem;border:1px solid rgba(229,231,235,.5)}
.sdiv{width:1px;height:28px;background:var(--b2)}
.slbl{font-size:11px;color:var(--t2);font-weight:500;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px;display:flex;align-items:center;gap:4px}
.sval{font-size:22px;font-weight:700;letter-spacing:-.02em;line-height:1.2}
.sval.g{color:var(--g)}.sval.r{color:var(--r)}
.si .l{font-size:11px;color:var(--t3);font-weight:500;margin-bottom:2px}.si .v{font-size:14px;font-weight:600}
.si .v.g{color:var(--g)}.si .v.r{color:var(--r)}.si .v.a{color:var(--a)}
.tag{font-size:9px;border-radius:3px;padding:1px 5px;font-weight:600}

/* ── ALERTS ── */
.alert{display:flex;align-items:flex-start;gap:.75rem;padding:.85rem 1.1rem;border-radius:10px;border-left:4px solid}
.alert.warn{background:var(--al);border-color:var(--a)}
.alert.danger{background:var(--rl);border-color:var(--r)}
.alert.info{background:#eff6ff;border-color:#3b82f6}
.alt{font-size:13px;font-weight:500}.alt span{color:var(--t2);font-weight:400}

/* ── FILTERS ── */
.pills{display:flex;gap:.5rem;flex-wrap:wrap;align-items:center}
.pill{padding:.5rem 1.2rem;border-radius:99px;border:1.5px solid var(--b2);background:var(--w);color:var(--t2);font-family:Inter,sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .25s cubic-bezier(.4,0,.2,1);display:flex;align-items:center;gap:.4rem;min-height:36px}
.pill:hover{border-color:var(--g);color:var(--g);background:rgba(29,185,84,.06);transform:translateY(-1px)}
.pill.on{background:var(--gl);border-color:var(--g);color:var(--g);font-weight:700;box-shadow:0 2px 8px rgba(29,185,84,.15)}
.srch{border:1.5px solid var(--b);border-radius:99px;padding:.45rem 1.2rem;font-size:14px;outline:none;font-family:Inter,sans-serif;color:var(--t);background:var(--w);transition:all .2s;min-width:200px}
.srch::placeholder{color:var(--t3)}
.srch:hover{border-color:var(--b2);background:rgba(244,246,249,.5)}
.srch:focus{border-color:var(--g);background:var(--w);box-shadow:0 0 0 3px rgba(29,185,84,.1)}

/* ── TABLE ── */
.th{display:grid;grid-template-columns:32px 80px 1.8fr 60px 130px 100px 110px 32px;gap:8px;padding:.6rem 1.2rem;background:rgba(244,246,249,.9);border-top:1px solid var(--b);border-bottom:2px solid var(--b2);font-weight:600;align-items:center;min-height:28px}
.th span{font-size:11px;font-weight:700;color:var(--t);text-transform:uppercase;letter-spacing:.05em;line-height:1.2}
.tr{display:grid;grid-template-columns:32px 80px 1.8fr 60px 130px 100px 110px 32px;gap:8px;padding:.4rem 1.2rem;align-items:flex-start;border-radius:4px;border:1px solid transparent;cursor:default;font-size:13px;border-bottom:1px solid rgba(229,231,235,.4);transition:all .2s;min-height:28px}
.tr:nth-child(even){background:rgba(244,246,249,.5)}
.tr:hover{background:rgba(29,185,84,.08);border-color:var(--g);box-shadow:inset 0 0 0 1.5px rgba(29,185,84,.15)}
.tr.tod{background:#fffbf0;border-color:#fde68a}
.tr.atr{background:var(--rl);border-color:#fecaca}
.tr.pgo{opacity:.62}
.tr.cor{background:#f0f9ff;border-color:#bae6fd}
.tr.sel{background:#eff6ff!important;border-color:#bfdbfe!important}
.dd{font-size:12px;font-weight:600;color:var(--t2);padding:3px 7px;border-radius:6px;cursor:pointer;border:1.5px solid transparent;display:inline-block;text-align:left;white-space:nowrap}
.dd:hover{background:var(--w);border-color:var(--b2)}.dd.tod{color:var(--a)}.dd.pst{color:var(--r)}
.dc{display:flex;flex-direction:column;min-width:0;gap:0}
.dn{font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--t);line-height:1}
.dn:hover{color:var(--g)}
.dm{display:flex;gap:2px;margin-top:0;align-items:center;flex-wrap:wrap;line-height:1}
.dobs{font-size:10px;color:var(--t3);background:var(--bg);border-radius:3px;padding:0 3px;line-height:1}
.vd{font-size:14px;font-weight:700;cursor:pointer;text-align:right;white-space:nowrap;line-height:1.3}
.vd::before{content:'R$ ';font-size:12px;font-weight:600;color:var(--t2)}
.vd.in{color:var(--g)}.vd.out{color:var(--r)}
.scw{display:flex;align-items:flex-start;justify-content:center;padding-top:2px}
.chip{border-radius:99px;font-size:11px;font-weight:600;padding:.25rem .7rem;cursor:pointer;white-space:nowrap;border:none;display:inline-flex;align-items:center;gap:.3rem;transition:all .2s;line-height:1}
.chip.pago{background:#dcfce7;color:#166534;border:1px solid #86efac}
.chip.pendente{background:#fef9c3;color:#854d0e;border:1px solid #fde047}
.chip.agendado{background:#dbeafe;color:#1e40af;border:1px solid #bfdbfe}
.chip.atrasado{background:#fee2e2;color:#991b1b;border:1px solid #fca5a5}
.pj{font-size:12px;font-weight:600}
.pj.pos{color:var(--g)}.pj.neg{color:var(--r)}.pj.zer{color:var(--t3)}
.pb{font-size:10px;border-radius:4px;padding:1px 5px;font-weight:600}
.pb-u{background:#f0fdf4;color:#166534}
.pb-p{background:#eff6ff;color:#1d4ed8}
.pb-c{background:#fff7ed;color:#c2410c}
.ra{display:flex;gap:4px;justify-content:flex-end;opacity:0}
.tr:hover .ra{opacity:1}
.cb-col{display:flex;align-items:center;justify-content:center}
input.row-cb{width:15px;height:15px;accent-color:var(--g);cursor:pointer;opacity:0;transition:opacity .15s}
.tr:hover input.row-cb,.tr.sel input.row-cb{opacity:1}
.ib{width:28px;height:28px;border-radius:6px;border:1.5px solid var(--b);background:var(--w);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;font-family:Inter,sans-serif}
.ib:hover{background:var(--bg)}.ib.del:hover{background:#fee2e2;border-color:#fca5a5;color:#dc2626}
.di{border:1.5px solid var(--g);border-radius:5px;padding:2px 6px;font-size:12px;outline:none;font-family:Inter,sans-serif;width:110px}
/* ── EDIT-DATE POPOVER ── */
.rec-pop{position:absolute;z-index:200;background:var(--w);border-radius:12px;box-shadow:0 4px 24px rgba(0,0,0,.13);border:1.5px solid var(--b);padding:.75rem 1rem;display:flex;flex-direction:column;gap:.5rem;min-width:220px;animation:fadeIn .12s ease}
.rec-pop p{font-size:12px;font-weight:600;color:var(--t2);margin-bottom:2px}
.rec-pop button{border:none;border-radius:8px;padding:.45rem .9rem;font-family:Inter,sans-serif;font-size:12px;font-weight:600;cursor:pointer;text-align:left;transition:background .1s}
.rec-pop .rp-este{background:var(--gl);color:var(--gd)}
.rec-pop .rp-este:hover{background:#d1f5e0}
.rec-pop .rp-seg{background:#eff6ff;color:#1e40af}
.rec-pop .rp-seg:hover{background:#dbeafe}
.rec-pop .rp-cancel{background:var(--bg);color:var(--t2)}
.rec-pop .rp-cancel:hover{background:var(--b)}
.hint{font-size:11px;color:var(--t3);padding:.5rem .75rem;font-style:italic}
.hint strong{color:var(--t2)}
.empty{text-align:center;padding:3rem;color:var(--t3)}
.sdd{position:fixed;background:var(--w);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.15);border:1px solid var(--b);z-index:100;min-width:140px;overflow:hidden}
.sdo{padding:.5rem .85rem;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:.5rem}
.sdo:hover{background:var(--bg)}
.sd{width:10px;height:10px;border-radius:50%}

/* ── BULK BAR ── */
.bulk-bar{display:none;position:sticky;top:calc(56px + env(safe-area-inset-top,0px));z-index:40;background:#1e40af;color:#fff;padding:.6rem 1rem;border-radius:10px;margin:.5rem .5rem 0;align-items:center;gap:.75rem;font-size:13px;font-weight:600;box-shadow:0 4px 12px rgba(30,64,175,.3)}
.bulk-bar.on{display:flex}
.bulk-btn{padding:.35rem .85rem;border-radius:7px;border:none;font-size:12px;font-weight:700;cursor:pointer;font-family:Inter,sans-serif}

/* ── SIDEBAR WIDGETS ── */
.sh{display:flex;align-items:center;gap:.75rem;margin-bottom:.85rem}
.si2{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.st{font-size:14px;font-weight:700}
.ar{display:flex;align-items:center;gap:.6rem;padding:.4rem 0}
.av{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700;flex-shrink:0}
.ai{flex:1}.an{font-size:13px;font-weight:500}.at{font-size:11px;color:var(--t3)}
.av2{font-size:14px;font-weight:700}
.av2.g{color:var(--g)}.av2.r{color:var(--r)}
.cs{display:flex;align-items:center;gap:.6rem;padding:.35rem 0}
.cbw{flex:1;min-width:0}
.cbl{display:flex;justify-content:space-between;font-size:12px;font-weight:500;margin-bottom:3px}
.cbb{height:5px;background:var(--bg);border-radius:99px;overflow:hidden}
.cbf{height:100%;border-radius:99px}
.pb2{height:8px;background:var(--bg);border-radius:99px;overflow:hidden;margin:6px 0}
.pf{height:100%;border-radius:99px}
.ins{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-top:.75rem}
.in2{background:var(--bg);border-radius:8px;padding:.4rem .6rem}
.in2 .l{font-size:10px;color:var(--t3);font-weight:500;margin-bottom:2px}
.in2 .v{font-size:12px;font-weight:700}

/* ── CREDIT CARDS ── */
.cc-item{background:var(--bg);border-radius:7px;padding:.45rem .65rem;margin-top:.35rem}
.cc-lbl{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px}
.cc-val{font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:4px}
.cc-val:hover{opacity:.7}
.cc-val .pe{font-size:10px;opacity:.4}
.cc-inp{font-size:13px;font-weight:700;width:100%;border:1.5px solid var(--g);border-radius:5px;padding:2px 5px;outline:none;background:var(--w);font-family:Inter,sans-serif}
.cc-row{display:grid;grid-template-columns:1fr 1fr;gap:.35rem}

/* ── MODAL ── */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(3px);z-index:500;display:flex;align-items:center;justify-content:center;padding:1.5rem;animation:fadeIn .2s ease}
.mw{background:var(--w);border-radius:16px;width:520px;max-width:95vw;max-height:90vh;overflow-y:auto;padding:1.75rem;display:flex;flex-direction:column;gap:1.25rem;box-shadow:0 20px 60px rgba(0,0,0,.3);animation:slideUp .3s cubic-bezier(.4,0,.2,1)}
.mt{display:flex;justify-content:space-between;align-items:center;font-size:16px;font-weight:700}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
.fg{display:flex;flex-direction:column;gap:4px}
.fg.full{grid-column:1/-1}
.fl{font-size:11px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.05em}
.fi{border:1.5px solid var(--b);border-radius:8px;padding:.5rem .75rem;font-size:13px;outline:none;font-family:Inter,sans-serif;color:var(--t);transition:border-color .15s}
.fi:focus{border-color:var(--g)}
.mf{display:flex;gap:.5rem;justify-content:flex-end;margin-top:.5rem}
.fs{background:var(--bg);border-radius:10px;padding:.85rem;display:flex;flex-direction:column;gap:.6rem}
.fst{font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.05em}
.pr{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.5rem}

/* ── TOOLTIPS ── */
[data-tooltip]{position:relative;cursor:help}
[data-tooltip]:hover::after{content:attr(data-tooltip);position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:var(--t);color:var(--bg);padding:.5rem .75rem;border-radius:6px;font-size:12px;font-weight:500;white-space:nowrap;z-index:1000;box-shadow:0 4px 12px var(--overlay);animation:slideUp .2s ease}
[data-tooltip]:hover::before{content:'';position:absolute;bottom:calc(100% + 2px);left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:var(--t);z-index:1000}

/* ── LOADING & SKELETON ── */
.skeleton{background:linear-gradient(90deg,#f0f0f0 25%,#e0e0e0 50%,#f0f0f0 75%);background-size:200% 100%;animation:shimmer 2s infinite;border-radius:8px}
body.dark-mode .skeleton{background:linear-gradient(90deg,#2d3748 25%,#4a5568 50%,#2d3748 75%)}
.spinner{display:inline-block;width:20px;height:20px;border:3px solid rgba(29,185,84,.2);border-top-color:var(--g);border-radius:50%;animation:spin 0.8s linear infinite}
.loading-overlay{position:absolute;inset:0;background:rgba(255,255,255,.8);display:flex;align-items:center;justify-content:center;border-radius:8px;z-index:10;backdrop-filter:blur(2px)}
body.dark-mode .loading-overlay{background:rgba(15,20,25,.8)}

/* Loading states for buttons */
button:disabled,button.loading{opacity:0.6;cursor:not-allowed}
button.loading{display:flex;align-items:center;gap:.5rem}
button.loading::after{content:'';display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin 0.8s linear infinite}

/* ── TOAST ── */
.toast{position:fixed;bottom:calc(80px + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%);background:#1a1d23;color:#fff;padding:.6rem 1.2rem;border-radius:99px;font-size:13px;font-weight:600;z-index:9999;transition:opacity .4s;white-space:nowrap;font-family:Inter,sans-serif;box-shadow:0 4px 16px rgba(0,0,0,.25);animation:slideDown .3s ease}

/* ── MOBILE TABS ── */
.tab-pane{
  display:none;flex-direction:column;gap:.6rem;
  padding:0 .6rem calc(68px + env(safe-area-inset-bottom,0px)) .6rem;
  animation:slideInUp .25s ease-out;
}
.tab-pane.on{display:flex}
@keyframes slideInUp{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:translateY(0)}
}
.tab-bar{
  display:none;
  position:fixed;bottom:0;left:0;right:0;
  background:#fff;
  border-top:1px solid #f0f0f0;
  z-index:300;
  padding-bottom:env(safe-area-inset-bottom,0px);
  box-shadow:0 -2px 20px rgba(0,0,0,.07);
}
.tab-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:4px;padding:.5rem .25rem .4rem;
  background:none;border:none;cursor:pointer;
  font-family:Inter,sans-serif;font-size:10px;font-weight:600;
  color:#999;transition:all .25s cubic-bezier(.4,0,.2,1);
  -webkit-tap-highlight-color:transparent;
  position:relative;min-height:60px;
}
.tab-btn .ti{font-size:22px;line-height:1;transition:all .25s cubic-bezier(.4,0,.2,1);opacity:.6}
.tab-btn:active{transform:scale(.95)}
.tab-btn.on{color:var(--g);font-weight:700}
.tab-btn.on .ti{opacity:1;transform:scale(1.15)}
.tab-btn.on::before{
  content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:40px;height:3px;background:linear-gradient(90deg,transparent,var(--g),transparent);border-radius:0 0 5px 5px;
  box-shadow:0 0 10px rgba(29,185,84,.3);
}

/* ── MOBILE OVERRIDES ── */

  .side{display:none!important}

  .tab-bar{display:flex!important}

  .pills{gap:.3rem;flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:2px}
  .pills::-webkit-scrollbar{display:none}
  .pill{font-size:11px;padding:.25rem .65rem;white-space:nowrap;flex-shrink:0}
  .srch{font-size:14px;width:100%;border-radius:10px}
  .hint{font-size:10px!important;padding:.3rem .6rem!important}
  .card{border-radius:12px}
  .sbar{display:block!important;padding:.9rem!important}
  .sdiv{display:none!important}
  .th{display:none!important}
}

/* ── RESPONSIVE ── */
@media(max-width:1440px){
  .lay{grid-template-columns:1fr 280px;gap:1.3rem;padding:1.3rem 1.5rem}
}

@media(max-width:1280px){

*:focus-visible{outline:2px solid var(--g);outline-offset:2px}
button:focus-visible,a:focus-visible,input:focus-visible,.pill:focus-visible,.desktop-tab:focus-visible{outline:2px solid var(--g);outline-offset:2px}

/* Ensure minimum click targets of 44x44px */

const MN=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const SL={pago:'Pago',pendente:'Pendente',agendado:'Agendado',atrasado:'Atrasado'};
const SO=[{v:'pago',l:'Pago',c:'#166534',d:'#dcfce7'},{v:'pendente',l:'Pendente',c:'#854d0e',d:'#fef9c3'},{v:'agendado',l:'Agendado',c:'#1e40af',d:'#dbeafe'},{v:'atrasado',l:'Atrasado',c:'#991b1b',d:'#fee2e2'}];
const CI={Casa:'🏠',Educação:'📚',Cartões:'💳',Saúde:'❤️',Receitas:'💚',Carro:'🚗',Outros:'📦'};
const CC={Casa:'#4caf50',Educação:'#2196f3',Cartões:'#e91e63',Saúde:'#ff9800',Receitas:'#1DB954',Carro:'#9c27b0',Outros:'#9e9e9e'};
// Mês vigente (atual)
const hoje=new Date();
let mes=hoje.getFullYear()+'-'+String(hoje.getMonth()+1).padStart(2,'0');
let fil='todos',eid=null,D={},dd=null,ocultarPagos=false;

// CONFIG: Constantes e configurações centralizadas
const CONFIG={
  // Chaves do localStorage
  storage:{
    backup:'nosso-lar-backup',
    theme:'nosso-lar-theme'
  },
  // Limites de tabela
  table:{
    maxRows:100,
    lineHeightPx:28,
    rowPaddingRem:0.4
  },
  // Períodos e datas

    monthsToShow:12,
    dateFormat:'DD/MM',
    dateFormatISO:'YYYY-MM-DD'
  },
  // Parcelamentos padrão
  installments:{
    defaultCount:12,
    minCount:1,
    maxCount:60
  },
  // Cartões padrão
  cards:{
    defaultClosureDay:13,
    defaultDueDay:20,
    defaultLimit:5000
  }
};

// TEMPLATES: Funções para renderizar componentes HTML
const TEMPLATES={
  // Status badge com cor
  statusBadge:(status)=>{

/* ── ROWS with recorrente injection ── */
function rows(){
  const base=D[mes]||[];
  const deletadosIds=new Set(base.filter(x=>x._deletado).map(x=>x.id));
  const result=base.filter(x=>!x._deletado);
  const mesIds=new Set(result.map(x=>x.id));
  Object.entries(D).forEach(([m,arr])=>{
    if(!Array.isArray(arr)||m===mes)return;
    arr.filter(r=>r.recorrente&&!r._recClone&&!r._deletado).forEach(r=>{
      const cloneId='rec_'+r.id+'_'+mes;
      if(deletadosIds.has(cloneId)||mesIds.has(cloneId)||result.find(x=>x.id===cloneId))return;
      const dia=(r.venc||'').slice(8,10)||'01';
      result.push({...r,id:cloneId,venc:mes+'-'+dia,pag:null,status:'pendente',_recClone:r.id,obs:r.obs||''});
    });
  });
  return result;
}

/* ── SALDO ── */
// Retorna o saldo FINAL de um mês (= o que sobrou ao fim do mês)
// Usado como saldo inicial do mês seguinte
function getSaldoFinal(m,depth){
  if((depth||0)>24)return 0; // proteção contra recursão infinita
  const meta=D[m+'_meta']||{};
  // Se o usuário ajustou manualmente o saldo atual deste mês, esse é o saldo final
  if(meta.saldoAtualManual!==undefined)return meta.saldoAtualManual;
  // Caso contrário: saldo inicial do mês + movimentações
  const si=getSI(m,(depth||0)+1);
  const pr=rowsOf(m);
  // Sempre considera todos os lançamentos (pago ou não) — fluxo de caixa completo
  return si+pr.filter(r=>r.tipo==='in').reduce((s,r)=>s+r.valor,0)
            -pr.filter(r=>r.tipo==='out').reduce((s,r)=>s+r.valor,0);
}

// Retorna todos os lançamentos de um mês (incluindo recorrentes injetados) sem alterar global
function rowsOf(m){
  const base=D[m]||[];
  const deletadosIds=new Set(base.filter(x=>x._deletado).map(x=>x.id));
  const result=base.filter(x=>!x._deletado);
  const mesIds=new Set(result.map(x=>x.id));
  Object.entries(D).forEach(([mk,arr])=>{
    if(!Array.isArray(arr)||mk===m)return;
    arr.filter(r=>r.recorrente&&!r._recClone&&!r._deletado).forEach(r=>{
      const cloneId='rec_'+r.id+'_'+m;
      if(deletadosIds.has(cloneId)||mesIds.has(cloneId)||result.find(x=>x.id===cloneId))return;
      const dia=(r.venc||'').slice(8,10)||'01';
      result.push({...r,id:cloneId,venc:m+'-'+dia,pag:null,status:'pendente',_recClone:r.id,obs:r.obs||''});
    });
  });
  return result;
}

// Retorna o saldo INICIAL de um mês (= saldo final do mês anterior)
function getSI(m,depth){
  if((depth||0)>24)return 0;
  const prev=addM(m,-1);
  // Se não há nenhum dado no mês anterior, começa do zero
  if(!D[prev]&&!D[prev+'_meta'])return 0;
  return getSaldoFinal(prev,(depth||0)+1);
}

function getMesesDisp(){
  return Object.keys(D).filter(k=>/^\d{4}-\d{2}$/.test(k)&&Array.isArray(D[k])).sort();
}
function buildSel(){
  const todos=getMesesDisp();
  const anos=[...new Set(todos.map(m=>m.slice(0,4)))].sort();
  const [anoAtual,mesAtual]=mes.split('-');
  const mesesDoAno=todos.filter(m=>m.startsWith(anoAtual)).map(m=>+m.slice(5));

  // label
  document.getElementById('nav-mes-txt').textContent=MN[+mesAtual-1];
  document.getElementById('nav-ano-txt').textContent=anoAtual;

  // setas prev/next
  const idx=todos.indexOf(mes);
  document.getElementById('nav-prev').disabled=idx<=0;
  document.getElementById('nav-next').disabled=idx>=todos.length-1;

  // picker anos
  const npAnos=document.getElementById('np-anos');
  npAnos.innerHTML=anos.map(a=>`<button class="np-ano${a===anoAtual?' on':''}" data-ano="${a}">${a}</button>`).join('');

  });

  const npMeses=document.getElementById('np-meses');

    const mi=i+1;const disp=mesesDoAno.includes(mi);

    return `<button class="np-mes${val===mes?' on':''}" ${disp?'':'disabled'} data-mes="${val}">${nm.slice(0,3)}</button>`;
  }).join('');
  npMeses.querySelectorAll('.np-mes:not([disabled])').forEach(b=>{
    function doChangeMes(ev){ev.stopPropagation();ev.preventDefault();changeMes(b.dataset.mes);}
    b.addEventListener('click',doChangeMes);
    b.addEventListener('touchend',doChangeMes);
  });
}
function pickAno(ano){
  const todos=getMesesDisp();
  const [,mesAtual]=mes.split('-');
  // tenta manter o mesmo mês, senão pega o mais recente do ano
  const alvo=ano+'-'+mesAtual;
  const mesesAno=todos.filter(m=>m.startsWith(ano)).sort();
  const novo=mesesAno.includes(alvo)?alvo:mesesAno[mesesAno.length-1];
  changeMes(novo);
}
function navMes(dir){
  const todos=getMesesDisp();
  const idx=todos.indexOf(mes);
  const novo=todos[idx+dir];
  if(novo)changeMes(novo);
}
let _pickerOpen=false;
let _pickerCloseHandler=null;
function removePickerListener(){
  if(_pickerCloseHandler){
    document.removeEventListener('click',_pickerCloseHandler);
    document.removeEventListener('touchend',_pickerCloseHandler);
    _pickerCloseHandler=null;
  }
}
function toggleNavPicker(e){
  if(e){e.stopPropagation();e.preventDefault();}
  _pickerOpen=!_pickerOpen;
  const p=document.getElementById('nav-picker');
  p.style.display=_pickerOpen?'block':'none';
  if(_pickerOpen){
    buildSel();
    removePickerListener();
    setTimeout(()=>{
      _pickerCloseHandler=(ev)=>{
        if(!document.getElementById('nav-mes').contains(ev.target)){
          _pickerOpen=false;
          document.getElementById('nav-picker').style.display='none';
          removePickerListener();
        }
      };
      document.addEventListener('click',_pickerCloseHandler);
      document.addEventListener('touchend',_pickerCloseHandler);
    },50);
  }else{
    removePickerListener();
  }
}

/* ── PROJECTED ── */
// sAtual = saldo já realizado (inicial + pagos). Os pendentes são projetados em ordem de vencimento.
function calcProj(all,sAtual){
  const unpaid=all.filter(r=>r.status!=='pago').sort((a,b)=>(a.venc||'').localeCompare(b.venc||''));
  let run=sAtual;
  const p={};unpaid.forEach(r=>{if(r.tipo==='in')run+=r.valor;else run-=r.valor;p[r.id]=run;});return p;
}

function buildCardItem(c,showPayBtn,compact){
  const diaHoje=new Date().getDate();
  const fatura=getFatura(c.id);
  const lancId='cc_'+c.id+'_'+mes;
  const lanc=(D[mes]||[]).find(r=>r.id===lancId);
  const pago=lanc&&lanc.status==='pago';
  const fechada=fatura>0&&diaHoje>=c.fechamento;
  const limite=getLimite(c.id);
  const pct=limite>0?Math.min(100,Math.round((fatura/limite)*100)):null;
  const barColor=pct>85?'var(--r)':pct>60?'var(--a)':'var(--g)';
  if(compact){
    return '<div style="display:flex;align-items:center;gap:.45rem;padding:.35rem 0;border-top:1px solid var(--b)">'
      +'<div style="width:22px;height:22px;border-radius:6px;background:'+c.cor+';display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;opacity:.75">'+c.emoji+'</div>'
      +'<div style="flex:1;font-size:12px;font-weight:600;color:var(--t2)">'+c.nome+'</div>'
      +'<div style="font-size:12.5px;font-weight:700;color:var(--g)">'+fv(fatura)+'</div>'
      +'</div>';
  }
  const fatColor=pago?'color:var(--g)':fatura===0?'color:var(--t3)':'color:var(--r)';
  const fatTxt=fatura===0?'+ fatura':fv(fatura);
  const badge=pago?'<span style="background:#dcfce7;color:#166534;border-radius:4px;font-size:8.5px;font-weight:700;padding:1px 5px">✅ Pago</span>'
    :fechada?'<span style="background:#fff8ee;color:#92400e;border-radius:4px;font-size:8.5px;font-weight:700;padding:1px 5px">🔒 Fechada</span>'
    :fatura===0?'<span style="background:#f3f4f6;color:#9ca3af;border-radius:4px;font-size:8.5px;font-weight:700;padding:1px 5px">sem fatura</span>'
    :'<span style="background:#fef9c3;color:#854d0e;border-radius:4px;font-size:8.5px;font-weight:700;padding:1px 5px">em aberto</span>';
  const btn=showPayBtn&&fatura>0&&!pago
    ?`<button onclick="pagarFaturaCartao('${c.id}')" style="width:100%;margin-top:.4rem;padding:.38rem;background:${fechada?'var(--g)':'var(--bg)'};color:${fechada?'#fff':'var(--t2)'};border:1.5px solid ${fechada?'var(--g)':'var(--b)'};border-radius:7px;font-size:11.5px;font-weight:700;cursor:pointer;font-family:Inter,sans-serif">${fechada?'✅ Marcar como Pago':'↓ Marcar Pago'}</button>`
    :'';
  const barHtml=pct!==null
    ?`<div style="margin-top:4px"><div style="display:flex;justify-content:space-between;font-size:9px;color:var(--t3);margin-bottom:2px"><span>Limite</span><span style="cursor:pointer" onclick="editLimite('${c.id}',this)">${pct}% de ${fv(limite)} ✎</span></div><div style="height:3px;background:var(--bg);border-radius:99px;overflow:hidden"><div style="height:100%;width:${pct}%;background:${barColor};border-radius:99px"></div></div></div>`
    :`<div style="font-size:9px;color:var(--t3);margin-top:2px;cursor:pointer" onclick="editLimite('${c.id}',this)">Definir limite ✎</div>`;
  return '<div style="padding:.55rem 0;border-top:1px solid var(--b)">'
    +'<div style="display:flex;align-items:flex-start;gap:.45rem">'
    +'<div style="width:26px;height:26px;border-radius:7px;background:'+c.cor+';display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0">'+c.emoji+'</div>'
    +'<div style="flex:1;min-width:0">'
    +'<div style="display:flex;align-items:center;justify-content:space-between;gap:.3rem">'
    +'<div style="font-size:12.5px;font-weight:700;display:flex;align-items:center;gap:4px">'+c.nome+' '+badge+'</div>'
    +`<div style="${fatColor};font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap" onclick="editCartao('${c.id}','fatura',this)">${fatTxt} <span style="font-size:8px;opacity:.4">✎</span></div>`
    +'</div>'
    +'<div style="font-size:9px;color:var(--t3);margin-top:1px">fecha dia '+c.fechamento+' · vence dia '+c.vencimento+'</div>'
    +barHtml
    +'</div>'
    +'</div>'+btn+'</div>';
}

let _filtroCartaoGrafico='todos';
function setFiltroCartaoGrafico(cartaoId){
  _filtroCartaoGrafico=cartaoId;
  renderGestaoCartoes();
}
function buildChartCartaoComFiltro(cartoes,data){
  try{
  if(!data||!data.length||!data.some(d=>d.total>0))return '<div style="text-align:center;padding:1.5rem 1rem;color:var(--t3);font-size:12px">Sem dados ainda. Registre faturas para ver o gráfico.</div>';

  const filtrado=_filtroCartaoGrafico==='todos'?cartoes:cartoes.filter(c=>c.id===_filtroCartaoGrafico);
  const W=320,H=200,PL=40,PR=8,PT=16,PB=32;
  const cW=W-PL-PR,cH=H-PT-PB;
  const maxVal=Math.max.apply(null,data.map(d=>{
    if(_filtroCartaoGrafico==='todos')return d.total;
    return filtrado.reduce((s,c)=>s+(d.totByCard[c.id]||0),0);
  }).concat([1]));

  const n=data.length;
  const bW=Math.max(6,Math.min(22,Math.floor(cW/n*0.7)));
  const gap=cW/n;
  const MNA=['J','F','M','A','M','J','J','A','S','O','N','D'];
  let s='';
  [0,0.25,0.5,0.75,1].forEach(function(p){
    const y=PT+cH-p*cH;
    const lbl=maxVal*p>=1000?(maxVal*p/1000).toFixed(0)+'k':Math.round(maxVal*p);
    s+='<line x1="'+PL+'" y1="'+y.toFixed(1)+'" x2="'+(W-PR)+'" y2="'+y.toFixed(1)+'" stroke="#e5e7eb" stroke-width="0.5"/>';
    s+='<text x="'+(PL-4)+'" y="'+(y+3).toFixed(1)+'" text-anchor="end" font-family="Inter,sans-serif" font-size="8" fill="#9ca3af">'+lbl+'</text>';
  });

  data.forEach(function(d,i){
    const bx=PL+i*gap+(gap-bW)/2;
    let sy=PT+cH;
    let temDado=false;
    filtrado.forEach(function(c){
      const v=d.totByCard[c.id]||0;
      if(v>0){temDado=true;const h=Math.max(2,(v/maxVal)*cH);sy-=h;s+='<rect x="'+bx.toFixed(1)+'" y="'+sy.toFixed(1)+'" width="'+bW+'" height="'+h.toFixed(1)+'" fill="'+c.cor+'" rx="1.5" opacity="0.85">'+'<title>'+c.nome+': '+fv(v)+'</title>'+'</rect>';}
    });
    const lbl=MNA[(+d.mes.slice(5)-1)];
    s+='<text x="'+(bx+bW/2).toFixed(1)+'" y="'+(H-PB+16).toFixed(1)+'" text-anchor="middle" font-family="Inter,sans-serif" font-size="8" fill="#9ca3af" font-weight="500">'+lbl+'</text>';
  });

  return '<svg viewBox="0 0 '+W+' '+H+'" width="100%" style="display:block">'+s+'</svg>';
  }catch(e){return '<div style="padding:1rem;color:red">Erro ao renderizar gráfico: '+e.message+'</div>';}
}

function buildCategoriesTable(){
  try{
  const all=(rows()||[]).filter(r=>r.tipo==='out');
  const byMonthandCat={};
  all.forEach(r=>{
    const m=r.venc?r.venc.slice(0,7):'desconhecido';
    if(!byMonthandCat[m])byMonthandCat[m]={};
    byMonthandCat[m][r.cat]=(byMonthandCat[m][r.cat]||0)+r.valor;
  });

  const meses=Object.keys(byMonthandCat).sort().reverse().slice(0,12);
  const cats=new Set();
  meses.forEach(m=>{Object.keys(byMonthandCat[m]).forEach(c=>cats.add(c));});
  const catsList=Array.from(cats).sort();

  let html='<div style="overflow-x:auto">';
  html+='<table style="width:100%;border-collapse:collapse;font-size:12px;font-family:Inter,sans-serif">';
  html+='<thead><tr style="border-bottom:2px solid var(--b)">';
  html+='<th style="text-align:left;padding:8px 6px;font-weight:700;color:var(--t2);background:var(--bg)">Categoria</th>';

  meses.forEach(m=>{
    const nm=MN[+m.slice(5)-1].slice(0,3)+'/'+m.slice(2,4);
    html+='<th style="text-align:right;padding:8px 6px;font-weight:600;color:var(--t2);background:var(--bg);white-space:nowrap">'+nm+'</th>';
  });

  html+='<th style="text-align:right;padding:8px 6px;font-weight:700;color:var(--g);background:var(--gl)">Total</th>';
  html+='</tr></thead><tbody>';

  catsList.forEach(cat=>{
    html+='<tr style="border-bottom:1px solid var(--b);transition:background .15s" onmouseover="this.style.background=\'var(--bg)\'" onmouseout="this.style.background=\'\'">';
    html+='<td style="padding:8px 6px;font-weight:600;color:var(--t)">'+(CI[cat]||'📦')+' '+cat+'</td>';

    let totalCat=0;
    meses.forEach(m=>{
      const v=(byMonthandCat[m]||{})[cat]||0;
      totalCat+=v;
      html+='<td style="text-align:right;padding:8px 6px;color:var(--t2)">'+fv(v)+'</td>';
    });

    html+='<td style="text-align:right;padding:8px 6px;font-weight:700;color:var(--g);background:var(--gl)">'+fv(totalCat)+'</td>';
    html+='</tr>';
  });

  html+='<tr style="border-top:2px solid var(--b);background:var(--bg);font-weight:700">';
  html+='<td style="padding:8px 6px">Total mês</td>';
  let totalGeral=0;
  meses.forEach(m=>{
    const v=Object.values(byMonthandCat[m]||{}).reduce((s,x)=>s+x,0);
    totalGeral+=v;
    html+='<td style="text-align:right;padding:8px 6px;color:var(--t)">'+fv(v)+'</td>';
  });
  html+='<td style="text-align:right;padding:8px 6px;color:var(--g);background:var(--gl)">'+fv(totalGeral)+'</td>';
  html+='</tr></tbody></table></div>';

  return html;
  }catch(e){return '<div style="padding:1rem;color:red">Erro ao renderizar tabela: '+e.message+'</div>';}
}

/* ── CARTÕES RICH ── */
function buildCardBars(cid,data){
  const last=data.slice(-6);
  if(!last.length||!last.some(d=>(d.totByCard[cid]||0)>0))return '';
  const vals=last.map(d=>d.totByCard[cid]||0);
  const meses=last.map(d=>d.mes);
  const max=Math.max(...vals,1);
  const W=288,H=50,n=vals.length,gap=3;
  const bW=Math.max(4,Math.floor((W-gap*(n-1))/n));
  const MNA=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  const cartao=getCartoes().find(c=>c.id===cid);const cor=(cartao&&cartao.cor)||'var(--a)';
  let bars='';
  vals.forEach((v,i)=>{
    const h=Math.max(2,(v/max)*(H-16));
    const x=i*(bW+gap);
    bars+=`<rect x="${x.toFixed(1)}" y="${(H-16-h).toFixed(1)}" width="${bW}" height="${h.toFixed(1)}" fill="${cor}" rx="2" opacity="${v>0?0.88:0.15}"/>`;
    const lbl=MNA[(+meses[i].slice(5)-1)];
    bars+=`<text x="${(x+bW/2).toFixed(1)}" y="${H-2}" text-anchor="middle" font-size="8" font-family="Inter,sans-serif" fill="#9ca3af">${lbl}</text>`;
    if(v>0){const tv=v>=1000?(v/1000).toFixed(1)+'k':Math.round(v);bars+=`<text x="${(x+bW/2).toFixed(1)}" y="${(H-18-h).toFixed(1)}" text-anchor="middle" font-size="7.5" font-family="Inter,sans-serif" fill="#6b7280" font-weight="600">${tv}</text>`;}
  });
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block;margin:.4rem 0 .1rem">${bars}</svg>`;
}

function saveCardSegments(cid){
  const segs={};
  CARD_CATS.forEach(cat=>{
    const inp=document.getElementById('sg_'+cid+'_'+cat.replace(/[^a-z]/gi,'_'));
    const v=parseFloat((inp&&inp.value)||'0');

  });
  setCardSegs(cid,segs);saveData();renderGestaoCartoes();
}

function editLimite(cid,el){

function buildGestaoData(){

function buildStackedChartSVG(data,cartoes){
  if(!data.length||!data.some(d=>d.total>0))return '<div style="text-align:center;padding:1.5rem 1rem;color:var(--t3);font-size:12px;line-height:1.6">Sem dados de fatura ainda.<br>Registre as faturas mês a mês para ver o histórico.</div>';
  const W=320,H=180,PL=40,PR=8,PT=12,PB=26;
  const cW=W-PL-PR,cH=H-PT-PB;
  const maxVal=Math.max.apply(null,data.map(d=>d.total).concat([1]));
  const n=data.length;
  const bW=Math.max(6,Math.min(26,Math.floor(cW/n*0.65)));
  const gap=cW/n;
  const MNA=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  let s='';
  [0,0.25,0.5,0.75,1].forEach(function(p){
    const y=PT+cH-p*cH;
    const lbl=maxVal*p>=1000?(maxVal*p/1000).toFixed(0)+'k':Math.round(maxVal*p);
    s+='<line x1="'+PL+'" y1="'+y.toFixed(1)+'" x2="'+(W-PR)+'" y2="'+y.toFixed(1)+'" stroke="#e5e7eb" stroke-width="0.5"/>';
    s+='<text x="'+(PL-4)+'" y="'+(y+3.5).toFixed(1)+'" text-anchor="end" font-family="Inter,sans-serif" font-size="9" fill="#9ca3af">'+lbl+'</text>';
  });
  data.forEach(function(d,i){
    const bx=PL+i*gap+(gap-bW)/2;let sy=PT+cH;
    cartoes.filter(function(c){return d.totByCard[c.id]>0;}).forEach(function(c){
      const h=Math.max(2,(d.totByCard[c.id]/maxVal)*cH);sy-=h;
      s+='<rect x="'+bx.toFixed(1)+'" y="'+sy.toFixed(1)+'" width="'+bW+'" height="'+h.toFixed(1)+'" fill="'+c.cor+'" rx="1.5" opacity="0.88"><title>'+c.nome+': '+fv(d.totByCard[c.id])+'</title></rect>';
    });
    const lbl=MNA[(+d.mes.slice(5)-1)]||d.mes.slice(5);
    s+='<text x="'+(bx+bW/2).toFixed(1)+'" y="'+(H-PB+14).toFixed(1)+'" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" fill="#9ca3af">'+lbl+'</text>';
    const tH=(d.total/maxVal)*cH;
    if(d.total>0&&tH>14){const tl=d.total>=1000?Math.round(d.total/1000)+'k':Math.round(d.total);s+='<text x="'+(bx+bW/2).toFixed(1)+'" y="'+(PT+cH-tH-3).toFixed(1)+'" text-anchor="middle" font-family="Inter,sans-serif" font-size="8" fill="#6b7280" font-weight="600">'+tl+'</text>';}
  });
  return '<svg viewBox="0 0 '+W+' '+H+'" width="100%" style="display:block">'+s+'</svg>';
}
function buildSparkline(cid,data){
  if(!data.length)return '';
  const last=data.slice(-6),vals=last.map(d=>d.totByCard[cid]||0),n=vals.length;
  if(!vals.some(v=>v>0)||n<2)return '';
  const max=Math.max.apply(null,vals.concat([1])),W=42,H=20;
  const pts=vals.map(function(v,i){return (2+i*(W-4)/(n-1)).toFixed(1)+','+(H-2-Math.max(1,(v/max)*(H-4))).toFixed(1);}).join(' ');
  const lx=(W-2).toFixed(1),ly=(H-2-Math.max(1,(vals[n-1]/max)*(H-4))).toFixed(1);

    +'<polyline points="'+pts+'" fill="none" stroke="var(--a)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>'
    +'<circle cx="'+lx+'" cy="'+ly+'" r="2" fill="var(--a)"/>'
    +'</svg>';
}

/* ── EDIT CARTÃO ── */
function syncCartaoLancamento(c){
  const fatura=getFatura(c.id);
  if(!fatura||fatura<=0){if(D[mes])D[mes]=D[mes].filter(r=>r.id!=='cc_'+c.id+'_'+mes);return;}
  const[ano,mo]=mes.split('-');const dia=String(c.vencimento).padStart(2,'0');
  const vencDate=ano+'-'+mo+'-'+dia;const lancId='cc_'+c.id+'_'+mes;
  if(!D[mes])D[mes]=[];const idx=D[mes].findIndex(r=>r.id===lancId);
  const lanc={id:lancId,tipo:'out',venc:vencDate,pag:null,desc:'Pagamento de fatura - '+c.nome,cat:'Cartões',valor:fatura,status:'pendente',obs:'Fatura '+c.nome+' — fechamento dia '+c.fechamento,parcelas:1,parcelaAtual:1};
  if(idx>=0){if(D[mes][idx].status!=='pago')Object.assign(D[mes][idx],lanc);else D[mes][idx].valor=fatura;}
  else D[mes].push(lanc);
}
function editCartao(cid,field,el){
  if(el.querySelector('input'))return;
  const cartoes=getCartoes();const c=cartoes.find(x=>x.id===cid);if(!c)return;
  const isFatura=field==='fatura';
  const inp=document.createElement('input');inp.type='number';const fatura=getFatura(cid);inp.value=isFatura?(fatura||0).toFixed(2):c[field];
  inp.step=isFatura?'0.01':'1';inp.min='0';if(!isFatura)inp.max='31';inp.className='cc-inp';
  el.innerHTML='';el.appendChild(inp);inp.focus();inp.select();
  const commit=()=>{const v=parseFloat(inp.value);if(!isNaN(v)&&v>=0){if(isFatura){setFatura(cid,+v.toFixed(2));}else{c[field]=Math.max(1,Math.min(31,Math.round(v)));D['_cartoes']=cartoes;}syncCartaoLancamento(c);saveData();toast('✅ Cartão atualizado com sucesso','success');}render();renderSide();};
  inp.addEventListener('blur',commit);inp.addEventListener('keydown',ev=>{if(ev.key==='Enter')inp.blur();if(ev.key==='Escape')renderSide();});inp.addEventListener('click',ev=>ev.stopPropagation());
}
function pagarFaturaCartao(cid){
  const cartoes=getCartoes();const c=cartoes.find(x=>x.id===cid);if(!c)return;
  const lancId='cc_'+c.id+'_'+mes;if(!D[mes])D[mes]=[];
  const idx=D[mes].findIndex(r=>r.id===lancId);
  if(idx>=0){D[mes][idx].status='pago';D[mes][idx].pag=today();}
  else{syncCartaoLancamento(c);const i=D[mes].findIndex(r=>r.id===lancId);if(i>=0){D[mes][i].status='pago';D[mes][i].pag=today();}}
  saveData();render();renderSide();toast('Fatura '+c.nome+' marcada como paga ✅');
}

function closeDd(){if(dd){dd.remove();dd=null;}}
function toggleStatus(e,id){
  e.stopPropagation();if(dd&&dd._id===id){closeDd();return;}closeDd();
  const rInMes=(D[mes]||[]).find(x=>x.id===id);
  const rVirtual=rows().find(x=>x.id===id);
  const r=rInMes||rVirtual;if(!r)return;
  const isClone=!!(r._recClone);
  const el=document.createElement('div');el.className='sdd';el._id=id;
  SO.forEach(o=>{
    const d=document.createElement('div');d.className='sdo';
    d.innerHTML='<span class="sd" style="background:'+o.c+'"></span>'+o.l;
    if(o.v===r.status)d.style.background='var(--bg)';
    d.addEventListener('click',ev=>{
      ev.stopPropagation();
      if(!D[mes])D[mes]=[];
      if(isClone){
        // materializa o clone no mês atual antes de alterar
        const override={...r,status:o.v,pag:o.v==='pago'?today():r.pag||null};
        const existIdx=D[mes].findIndex(x=>x.id===id);
        if(existIdx>=0)D[mes][existIdx]=override;else D[mes].push(override);
      } else {
        const idx=D[mes].findIndex(r2=>r2.id===id);if(idx<0)return;
        D[mes][idx].status=o.v;if(o.v==='pago')D[mes][idx].pag=today();
        if(o.v!=='pago')D[mes][idx].pag=null;
      }
      saveData();render();renderSide();closeDd();
    });
    el.appendChild(d);
  });
  // captura posição antes de qualquer mudança no DOM
  const chipRect=e.currentTarget.getBoundingClientRect();
  const clickY=e.clientY||chipRect.bottom;
  const clickX=e.clientX||chipRect.left;
  // insere fora da tela para medir
  el.style.top='-9999px';el.style.left='-9999px';
  document.body.appendChild(el);dd=el;
  // mede após reflow
  const ddH=el.offsetHeight;
  const ddW=el.offsetWidth;
  // posiciona: abre abaixo do chip se couber, senão acima
  const spaceBelow=window.innerHeight-chipRect.bottom-4;
  const top=spaceBelow>=ddH?chipRect.bottom+4:Math.max(4,chipRect.top-ddH-4);
  const left=Math.min(Math.max(4,clickX-20),window.innerWidth-ddW-8);
  el.style.top=top+'px';el.style.left=left+'px';
  setTimeout(()=>document.addEventListener('click',function h(ev2){
    if(el.contains(ev2.target))return;
    closeDd();document.removeEventListener('click',h);
  }),10);
}

function editDate(e,id){
  e.stopPropagation();const el=e.currentTarget;
  // Busca o lançamento — pode estar no mês atual ou ser um clone virtual
  const rInMes=(D[mes]||[]).find(x=>x.id===id);

  if(!r)return;

  const inp=document.createElement('input');inp.type='date';inp.value=(isPago?r.pag:r.venc)||'';inp.className='di';

  // Wrapper relativo para poder posicionar o popover
  const wrap=document.createElement('span');wrap.style.position='relative';
  el.replaceWith(wrap);wrap.appendChild(inp);inp.focus();

  let committed=false;

  const applyDate=(value,scope)=>{
    if(committed)return;committed=true;
    if(value)patchDate(id,field,value,scope,r);else render();
  };

  const showRecPop=(value)=>{
    // Remove qualquer popover anterior
    document.querySelectorAll('.rec-pop').forEach(p=>p.remove());

    pop.innerHTML='<p>Alterar data do recorrente</p>';

    bEste.onclick=(ev)=>{ev.stopPropagation();pop.remove();applyDate(value,'este');};
    bSeg.onclick=(ev)=>{ev.stopPropagation();pop.remove();applyDate(value,'seguintes');};
    bCan.onclick=(ev)=>{ev.stopPropagation();pop.remove();render();};
    // Fecha ao clicar fora
    setTimeout(()=>document.addEventListener('click',function h(ev){if(!pop.contains(ev.target)){pop.remove();if(!committed)render();document.removeEventListener('click',h);}},{once:false}),10);
  };

  const onCommit=()=>{
    if(committed)return;
    const value=inp.value;
    if(!value){render();return;}
    if(isRec&&field==='venc'){
      showRecPop(value);
    } else {
      applyDate(value,'este');

  inp.addEventListener('blur',()=>{if(!committed)onCommit();});
  inp.addEventListener('keydown',ev=>{if(ev.key==='Enter'){inp.blur();}if(ev.key==='Escape'){committed=true;render();}});
  inp.addEventListener('click',ev=>ev.stopPropagation());
}

/* ── PATCH VAL (recorrentes com escopo) ── */
function patchVal(id,value,scope,rOrig){
  const isClone=!!(rOrig&&rOrig._recClone);
  const paiId=isClone?rOrig._recClone:id;
  if(scope==='seguintes'){
    Object.entries(D).forEach(([m,arr])=>{
      if(!Array.isArray(arr))return;
      const i=arr.findIndex(r=>r.id===paiId&&r.recorrente&&!r._recClone);
      if(i>=0)D[m][i].valor=value;
    });
    Object.keys(D).forEach(m=>{
      if(m<mes)return;
      if(!Array.isArray(D[m]))return;
      D[m].forEach((r,i)=>{if(r._recClone===paiId)D[m][i].valor=value;});
    });
    saveData();render();renderSide();return;
  }
  if(!D[mes])D[mes]=[];
  const existIdx=D[mes].findIndex(r=>r.id===id);
  if(existIdx>=0){D[mes][existIdx].valor=value;}
  else{D[mes].push({...rOrig,valor:value});}
  saveData();render();renderSide();
}

/* ── PATCH ── */
function patch(id,field,value){
  if(!D[mes])return;const idx=D[mes].findIndex(r=>r.id===id);if(idx<0)return;
  if(field==='venc'&&value){
    const newMes=value.slice(0,7);
    if(newMes!==mes){
      const entry={...D[mes][idx],venc:value};D[mes].splice(idx,1);
      if(!D[newMes])D[newMes]=[];D[newMes].push(entry);
      saveData();render();renderSide();return;
    }
  }
  if(field==='pag'&&value){const newMes=value.slice(0,7);if(newMes!==mes){const entry={...D[mes][idx],pag:value};D[mes].splice(idx,1);if(!D[newMes])D[newMes]=[];D[newMes].push(entry);saveData();render();renderSide();return;}}
  D[mes][idx][field]=value;saveData();render();renderSide();
}

/* ── PATCH DATE (recorrentes com escopo) ── */
function patchDate(id,field,value,scope,rOrig){
  // scope: 'este' = só este mês | 'seguintes' = este + todos os meses futuros
  const isClone=!!(rOrig&&rOrig._recClone);
  const paiId=isClone?rOrig._recClone:id;
  const newDay=value.slice(8,10); // "DD" da nova data

  if(scope==='seguintes'&&field==='venc'){
    // 1. Atualiza o dia do lançamento pai (recorrente original)
    let paiMes=null,paiIdx=-1;
    Object.entries(D).forEach(([m,arr])=>{
      if(!Array.isArray(arr))return;
      const i=arr.findIndex(r=>r.id===paiId&&r.recorrente&&!r._recClone);
      if(i>=0){paiMes=m;paiIdx=i;}
    });
    if(paiMes!==null&&paiIdx>=0){
      const paiVenc=D[paiMes][paiIdx].venc||'';
      D[paiMes][paiIdx].venc=paiVenc.slice(0,8)+newDay;
    }
    // 2. Remove overrides explícitos de meses futuros (clones gravados) cujo dia divergia
    //    para que passem a usar o novo dia padrão do pai
    Object.keys(D).forEach(m=>{
      if(m<=mes&&m!==mes)return; // só meses >= atual
      if(!Array.isArray(D[m]))return;
      D[m]=D[m].filter(r=>!(r._recClone===paiId&&m!==paiMes));
    });
    // 3. Se este mês já tem um clone gravado com dia diferente, atualiza ou remove
    if(D[mes]){
      const ciIdx=D[mes].findIndex(r=>r.id===id||(r._recClone===paiId));
      if(ciIdx>=0){
        D[mes][ciIdx].venc=mes+'-'+newDay;
      }
    }
    saveData();render();renderSide();
    return;
  }

  // scope === 'este': cria/atualiza um override explícito só neste mês
  if(field==='venc'){
    if(!D[mes])D[mes]=[];
    // Se o lançamento já está gravado neste mês, atualiza normalmente
    const existIdx=D[mes].findIndex(r=>r.id===id);
    if(existIdx>=0){
      const newMes=value.slice(0,7);
      if(newMes!==mes){
        const entry={...D[mes][existIdx],venc:value};D[mes].splice(existIdx,1);
        if(!D[newMes])D[newMes]=[];D[newMes].push(entry);
        saveData();render();renderSide();return;
      }
      D[mes][existIdx].venc=value;
      saveData();render();renderSide();
      return;
    }
    // É um clone virtual — grava um override explícito neste mês
    if(isClone&&rOrig){
      const override={...rOrig,id:id,_recClone:paiId,venc:value,pag:null,status:rOrig.status||'pendente'};
      D[mes].push(override);
      saveData();render();renderSide();
      return;
    }
  }
  // Fallback: patch simples
  patch(id,field,value);
}

/* ── DELETE ── */
function delItem(id){
  const r=rows().find(x=>x.id===id);
  if(r&&r._recClone){if(!confirm('Remover "'+r.desc+'" apenas em '+mes+'?'))return;if(!D[mes])D[mes]=[];D[mes].push({id,_deletado:true});saveData();render();renderSide();return;}
  if(r&&r.recorrente){const todos=window.confirm('Recorrente: OK = todos os meses | Cancelar = só este mês');if(todos){Object.keys(D).forEach(m=>{if(Array.isArray(D[m]))D[m]=D[m].filter(x=>x.id!==id&&x._recClone!==id);});}else{D[mes]=(D[mes]||[]).filter(x=>x.id!==id);}saveData();render();renderSide();return;}

}

/* ── EDIT SALDO ── */
function editSaldo(e){
  e.stopPropagation();const el=document.getElementById('svd');if(!el||el.querySelector('input'))return;
  const all=rows();const pOut=all.filter(r=>r.tipo==='out'&&r.status==='pago').reduce((s,r)=>s+r.valor,0);
  const pIn=all.filter(r=>r.tipo==='in'&&r.status==='pago').reduce((s,r)=>s+r.valor,0);
  const metaAtual=(D[mes+'_meta']||{});
  const cur=metaAtual.saldoAtualManual!==undefined?metaAtual.saldoAtualManual:getSI(mes)+pIn-pOut;
  const inp=document.createElement('input');inp.type='number';inp.value=cur.toFixed(2);inp.step='0.01';
  inp.style.cssText='font-size:18px;font-weight:700;width:150px;border:2px solid var(--g);border-radius:6px;padding:2px 8px;outline:none;color:var(--t);background:var(--w);font-family:Inter,sans-serif';
  el.textContent='';el.appendChild(inp);inp.focus();inp.select();
  const commit=()=>{
    const val=parseFloat(inp.value);
    if(!isNaN(val)&&Math.abs(val-cur)>=0.01){
      // Remove correções antigas, limpa manual antigo e salva saldo atual diretamente
      D[mes]=(D[mes]||[]).filter(r=>!r._correcao);
      if(!D[mes+'_meta'])D[mes+'_meta']={};
      delete D[mes+'_meta'].saldoInicialManual; // limpa formato antigo
      D[mes+'_meta'].saldoAtualManual=+val.toFixed(2);
      saveData();toast('Saldo atualizado: '+fv(val));
    }
    render();renderSide();
  };
  inp.addEventListener('blur',commit);inp.addEventListener('keydown',ev=>{if(ev.key==='Enter')inp.blur();if(ev.key==='Escape'){render();renderSide();}});inp.addEventListener('click',ev=>ev.stopPropagation());
}

  const pa=pt==='parcelado'?parseInt(document.getElementById('f-pa').value)||1:1;

  if(pt==='parcelado'){const vt=document.querySelector('input[name="vt"]:checked')?.value||'parcela';if(vt==='total')vraw=+(vraw/parcelas).toFixed(2);}
  const isRec=document.getElementById('f-rec')?.checked||false;

  if(!D[mes])D[mes]=[];
  if(eid){const idx=D[mes].findIndex(x=>x.id===eid);if(idx>=0)Object.assign(D[mes][idx],item);}
  else{D[mes].push({...item,id:uid()});if(criar&&pa<parcelas){for(let i=pa+1;i<=parcelas;i++){const fm=addM(mes,i-pa);if(!D[fm])D[fm]=[];D[fm].push({...item,parcelaAtual:i,status:'pendente',pag:null,venc:sameDay(item.venc,fm),id:uid()});}}}

}

function copyToClipboard(el){

function downloadFile(content,filename,type){
  const blob=new Blob([content],{type});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=filename;
  a.click();
  URL.revokeObjectURL(url);
  toast('📥 Arquivo baixado!');
}

/* ── DESKTOP PAGE NAVIGATION ── */
async function switchPage(page){
  

  // Atualizar abas ativas
  document.querySelectorAll('.desktop-tab').forEach(tab=>{
    const isActive=tab.dataset.page===page;
    tab.classList.toggle('active',isActive);
    tab.setAttribute('aria-selected',isActive);
  });

  // Mostrar/ocultar páginas
  document.querySelectorAll('.page-container').forEach(container=>{
    container.classList.remove('active');
    container.style.display='none';
  });

  const pageEl=document.getElementById('page-'+page);
  if(pageEl){
    pageEl.classList.add('active');
    pageEl.style.display='flex';

    // Renderizar imediatamente (sem delay)
    try{
      if(page==='lancamentos'){
        renderLancamentosDesktop();
      } else if(page==='cartoes'){
        await renderCartoesDesktopNovo();
        checkCartaoAlerts();
      } else if(page==='visao-geral'){
        renderVisaoGeralDesktopNovo();
      }
      
    } catch(e){
      
      pageEl.innerHTML='<div class="card" style="padding:2rem;text-align:center;color:var(--r)">Erro ao carregar página</div>';
    }
  }
}

document.addEventListener('DOMContentLoaded',()=>{
  const tabs=document.querySelectorAll('.desktop-tab');
  if(tabs.length>0){
    tabs.forEach((tab,idx)=>{
      tab.addEventListener('keydown',ev=>{
        let nextIdx=idx;
        if(ev.key==='ArrowRight')nextIdx=(idx+1)%tabs.length;
        if(ev.key==='ArrowLeft')nextIdx=(idx-1+tabs.length)%tabs.length;
        if(ev.key==='Home')nextIdx=0;
        if(ev.key==='End')nextIdx=tabs.length-1;

        if(nextIdx!==idx){
          ev.preventDefault();
          tabs[nextIdx].focus();
          tabs[nextIdx].click();
        }
      });
    });
  }
});

/* ── FASE 1: Renderização de Faturas ── */
async function fetchFaturasFromSupabase(){
  try{

    const sb=getSB();
    
    if(!sb){
      
      return;
    }

    
    // Buscar dados da tabela nosso_lar_faturas
    const{data:faturas,error}=await sb
      .from('nosso_lar_faturas')
      .select('*')
      .order('mes_ref',{ascending:false});

    
    
    
    if(faturas?.length>0) 

    if(error){
      toast('❌ Erro ao buscar: '+error.message, 'error');
      return;
    }

    if(!faturas||faturas.length===0){
      toast('❌ Nenhum dado de fatura no Supabase','error');
      D._faturas={};
      D._limites={};
      D._faturasRaw=[];
      return;
    }

    await processarFaturas(faturas);

  }catch(e){
    toast('❌ Erro crítico ao buscar faturas', 'error');
  }
}

async function processarFaturas(faturas){
  try{
    

    if(!faturas||faturas.length===0){
      
      return;
    }

    // Organizar dados por mês e cartão
    const faturasPorMes={};
    const limites={};

    // Gerar categorias com IA para faturas que não têm
    const faturasComCategoria=await Promise.all(
      faturas.map(async f=>{
        if(!f.categoria){
          f.categoria=await gerarCategoriaComIA(f);
        }
        if(!f.items){
          f.items='Fatura - '+f.banco||'transação';
        }
        return f;
      })
    );

    faturasComCategoria.forEach(f=>{
      // Usar mes_ref como identificador do mês (YYYY-MM)
      const mes=f.mes_ref||today().slice(0,7);
      if(!faturasPorMes[mes])faturasPorMes[mes]={};

      // Agrupar fatura_total por cartão
      const cartaoId=f.cartao;
      if(!cartaoId){
        
        return;
      }

      if(!faturasPorMes[mes][cartaoId]){
        faturasPorMes[mes][cartaoId]=0;
      }

      // Somar o total da fatura
      faturasPorMes[mes][cartaoId]+=f.fatura_total||0;

      // Armazenar limite do cartão
      if(f.limite){
        limites[cartaoId]=f.limite;
      }
    });

    // Implementar projeção de parcelas futuras
    const faturasComProjecao=await projetarParcelasFuturas(faturasComCategoria);

    D._faturas=faturasPorMes;
    D._limites=limites;
    D._faturasRaw=faturasComProjecao; // Armazenar dados brutos com projeção

    
    
    
    
  }catch(e){
    
    
  }
}

async function gerarCategoriaComIA(fatura){
  try{
    // Inferir categoria baseado no banco e valor
    const banco=(fatura.banco||'').toLowerCase();
    const valor=fatura.fatura_total||0;

    // Mapa de padrões banco -> categoria padrão
    const categoriaPorBanco={
      'itau':'Financeiro',
      'bradesco':'Financeiro',
      'caixa':'Financeiro',
      'santander':'Financeiro',
      'mastercard':'Cartão de Crédito',
      'visa':'Cartão de Crédito',
      'elo':'Cartão de Crédito',
    };

    let categoria=categoriaPorBanco[banco]||'Outros';

    // Refinar baseado no valor
    if(valor<100){
      categoria='Alimentação';
    }else if(valor>=100 && valor<500){
      categoria='Mercado';
    }else if(valor>=500 && valor<1500){
      categoria='Saúde';
    }else if(valor>=1500 && valor<3000){
      categoria='Educação';
    }else{
      categoria='Assinaturas';
    }

    
    return categoria;
  }catch(e){
    
    return 'Outros';
  }
}

async function projetarParcelasFuturas(faturas){
  // Identificar faturas parceladas e criar projeções
  const faturasComProjecao=[...faturas];
  const hoje=new Date();
  const anoAtual=hoje.getFullYear();
  const mesAtual=hoje.getMonth()+1;

  faturas.forEach(f=>{
    // Se tem parcelas futuras, criar entradas para os próximos meses
    const parcelas=f.parcelas||1;
    const parcelaAtual=f.parcela_atual||1;

    if(parcelas>1 && parcelaAtual<parcelas){
      const valorParcela=f.fatura_total/parcelas;
      const [ano,mesStr]=(f.mes_ref||today()).split('-');

      // Criar projeções para próximas parcelas
      for(let p=parcelaAtual+1;p<=parcelas;p++){
        const mesParcela=parseInt(mesStr)+p-parcelaAtual;
        const anoParcela=ano+Math.floor((mesParcela-1)/12);
        const mesProj=String((mesParcela-1)%12+1).padStart(2,'0');
        const mesRefProj=`${anoParcela}-${mesProj}`;

        faturasComProjecao.push({
          ...f,
          id:f.id+'_proj_'+p,
          mes_ref:mesRefProj,
          fatura_total:valorParcela,
          parcela_atual:p,
          _isProjecao:true
        });
      }
    }
  });

  return faturasComProjecao;
}

function renderGraficoConsumoMensal(){
  const graficoEl=document.getElementById('grafico-consumo-mensal');
  if(!graficoEl)return;

  
  
  

  const faturas=D._faturasRaw||[];
  if(faturas.length===0){
    
    graficoEl.innerHTML='<div style="color:var(--t3);padding:2rem;text-align:center"><div>❌ Sem dados de faturas</div><div style="font-size:11px;margin-top:.5rem">Verifique os dados no Supabase</div></div>';
    return;
  }

  // Agrupar por mês e calcular total
  const gastosPorMes={};
  faturas.forEach(f=>{
    
    const mes=f.mes_ref;
    if(!mes){
      
      return;
    }
    if(!gastosPorMes[mes])gastosPorMes[mes]=0;
    gastosPorMes[mes]+=(f.fatura_total||0);
  });

  

  // Ordenar meses
  const meses=Object.keys(gastosPorMes).sort();
  if(meses.length===0){
    graficoEl.innerHTML='<div style="color:var(--t3)">Sem dados</div>';
    return;
  }

  // Encontrar máximo para escala
  const maxGasto=Math.max(...Object.values(gastosPorMes));
  const escala=1/maxGasto;

  // Criar gráfico de linhas simples em SVG
  const width=800,height=220,padding=40;
  const chartWidth=width-2*padding;
  const chartHeight=height-2*padding;
  const pontos=meses.length;
  const stepX=chartWidth/(pontos-1||1);

  let svg=`<svg width="${width}" height="${height}" style="overflow:visible">`;

  // Grid horizontal
  for(let i=0;i<=4;i++){
    const y=padding+i*chartHeight/4;
    const valor=Math.round(maxGasto*(4-i)/4);
    svg+=`<line x1="${padding}" y1="${y}" x2="${width-padding}" y2="${y}" stroke="var(--b)" stroke-width="1" stroke-dasharray="4"/>`;
    svg+=`<text x="${padding-5}" y="${y+3}" font-size="10" fill="var(--t3)" text-anchor="end">${fv(valor)}</text>`;
  }

  // Plotar linha
  let pathData='';
  meses.forEach((m,i)=>{
    const x=padding+i*stepX;
    const valor=gastosPorMes[m];
    const y=padding+chartHeight*(1-valor*escala);
    pathData+=`${i===0?'M':'L'} ${x} ${y} `;
  });

  svg+=`<path d="${pathData}" stroke="var(--a)" stroke-width="2" fill="none" stroke-linecap="round"/>`;

  // Plotar pontos e labels
  meses.forEach((m,i)=>{
    const x=padding+i*stepX;
    const valor=gastosPorMes[m];
    const y=padding+chartHeight*(1-valor*escala);
    svg+=`<circle cx="${x}" cy="${y}" r="4" fill="var(--a)" stroke="var(--w)" stroke-width="2"/>`;
    svg+=`<text x="${x}" y="${height-10}" font-size="11" fill="var(--t2)" text-anchor="middle" font-weight="600">${m}</text>`;
  });

  svg+=`</svg>`;

  // Criar container com tooltip
  const container=document.createElement('div');
  container.style.cssText='width:100%;overflow-x:auto;position:relative';

  const svgWrapper=document.createElement('div');
  svgWrapper.innerHTML=svg;
  svgWrapper.style.cssText='position:relative;display:inline-block;cursor:pointer';

  // Criar camada clicável invisível para os pontos
  const clickLayer=document.createElement('svg');
  clickLayer.setAttribute('width',width);
  clickLayer.setAttribute('height',height);
  clickLayer.style.cssText='position:absolute;top:0;left:0;cursor:pointer;opacity:0';

  meses.forEach((m,i)=>{
    const x=padding+i*stepX;
    const valor=gastosPorMes[m];
    const y=padding+chartHeight*(1-valor*escala);
    const circle=document.createElementNS('http://www.w3.org/2000/svg','circle');
    circle.setAttribute('cx',x);
    circle.setAttribute('cy',y);
    circle.setAttribute('r','8');
    circle.setAttribute('fill','transparent');
    circle.setAttribute('data-mes',m);
    circle.setAttribute('style','cursor:pointer');
    circle.addEventListener('click',(e)=>{
      e.stopPropagation();
      showGraficoBreakdown(m);
    });
    clickLayer.appendChild(circle);
  });
  svgWrapper.appendChild(clickLayer);

  const tooltip=document.createElement('div');
  tooltip.style.cssText='position:absolute;background:rgba(0,0,0,0.8);color:#fff;padding:.5rem .75rem;border-radius:6px;font-size:12px;pointer-events:none;opacity:0;transition:opacity 0.2s;z-index:10;white-space:nowrap';
  tooltip.textContent='Passe o mouse sobre o gráfico';
  svgWrapper.appendChild(tooltip);

  const dados={meses,gastosPorMes,padding,chartWidth,chartHeight,stepX,height};

  svgWrapper.addEventListener('mousemove',(e)=>{
    const rect=svgWrapper.getBoundingClientRect();
    const mouseX=e.clientX-rect.left;
    const pointX=mouseX-padding;
    if(pointX<0||pointX>chartWidth){tooltip.style.opacity='0';return;}

    const idx=Math.round(pointX/stepX);
    if(idx<0||idx>=meses.length){tooltip.style.opacity='0';return;}

    const mes=meses[idx];
    const valor=gastosPorMes[mes];
    tooltip.textContent=`${mes} • ${fv(valor)}`;
    tooltip.style.left=(padding+idx*stepX-tooltip.offsetWidth/2)+'px';
    tooltip.style.top=(padding-30)+'px';
    tooltip.style.opacity='1';
  });

  svgWrapper.addEventListener('mouseleave',()=>{tooltip.style.opacity='0';});
  svgWrapper.addEventListener('touchmove',(e)=>{
    if(e.touches.length===0)return;
    const touch=e.touches[0];
    const rect=svgWrapper.getBoundingClientRect();
    const touchX=touch.clientX-rect.left;
    const pointX=touchX-padding;
    if(pointX<0||pointX>chartWidth){tooltip.style.opacity='0';return;}

    const idx=Math.round(pointX/stepX);
    if(idx<0||idx>=meses.length){tooltip.style.opacity='0';return;}

    const mes=meses[idx];
    const valor=gastosPorMes[mes];
    tooltip.textContent=`${mes} • ${fv(valor)}`;
    tooltip.style.left=(padding+idx*stepX-tooltip.offsetWidth/2)+'px';
    tooltip.style.top=(padding-30)+'px';
    tooltip.style.opacity='1';
  });

  svgWrapper.addEventListener('touchend',()=>{tooltip.style.opacity='0';});

  container.appendChild(svgWrapper);
  graficoEl.innerHTML='';
  graficoEl.appendChild(container);
}

function renderGraficoCategoriasmensal(){
  const graficoEl=document.getElementById('grafico-categorias-mensal');

  const faturas=D._faturasRaw||[];
  if(faturas.length===0){

    return;
  }

  // Agrupar por mês e categoria
  const categoriasPorMes={};
  faturas.forEach(f=>{
    const mes=f.mes_ref;
    const cat=f.categoria||'Sem categoria';
    if(!mes){
      
      return;
    }

    if(!categoriasPorMes[mes])categoriasPorMes[mes]={};
    if(!categoriasPorMes[mes][cat])categoriasPorMes[mes][cat]=0;
    categoriasPorMes[mes][cat]+=f.fatura_total||0;
  });

  const meses=Object.keys(categoriasPorMes).sort();
  if(meses.length===0){
    graficoEl.innerHTML='<div style="color:var(--t3)">Sem dados</div>';
    return;
  }

  // Obter todas as categorias únicas
  const categorias=new Set();
  Object.values(categoriasPorMes).forEach(catMap=>{
    Object.keys(catMap).forEach(cat=>categorias.add(cat));
  });

  const categoriasArray=Array.from(categorias).sort();

  // Cores para categorias
  const coresCategorias={};
  const cores=['#ec7000','#1DB954','#dc2626','#0070c0','#9333ea','#f59e0b','#06b6d4','#8b5cf6'];
  categoriasArray.forEach((cat,i)=>{
    coresCategorias[cat]=cores[i%cores.length];
  });

  // Criar tabela com % por categoria
  let html=`
    <div style="display:grid;grid-template-columns:1fr;gap:1rem">
      <div style="overflow-x:auto">
        <table style="width:100%;font-size:11px">
          <thead>
            <tr style="border-bottom:2px solid var(--b)">
              <th style="padding:.5rem;text-align:left;color:var(--t2);font-weight:600">Categoria</th>

  meses.forEach(m=>{
    html+=`<th style="padding:.5rem;text-align:right;color:var(--t2);font-weight:600;min-width:80px">${m}</th>`;
  });

  html+=`</tr></thead><tbody>`;

  // Linhas das categorias
  categoriasArray.forEach(cat=>{
    html+=`
      <tr style="border-bottom:1px solid var(--b)">
        <td style="padding:.5rem;color:var(--t2);font-weight:500">
          <span style="display:inline-block;width:10px;height:10px;background:${coresCategorias[cat]};border-radius:2px;margin-right:.5rem"></span>
          ${cat}
        </td>
    `;

    meses.forEach(mes=>{
      const total=Object.values(categoriasPorMes[mes]).reduce((s,v)=>s+v,0);
      const valor=categoriasPorMes[mes][cat]||0;
      const percentual=total>0?(valor/total*100):0;

      html+=`<td style="padding:.5rem;text-align:right;color:var(--t)">
        <strong>${percentual.toFixed(0)}%</strong>
        <div style="font-size:10px;color:var(--t3)">${fv(valor)}</div>
      </td>`;
    });

    html+=`</tr>`;
  });

  html+=`</tbody></table></div></div>`;

  graficoEl.innerHTML=html;
}

async function salvarEdicaoCartao(cartaoId,novoLimite,novaDataFech,novaDataVenc){
  try{
    

    // Validar inputs
    if(!novoLimite||isNaN(parseFloat(novoLimite))){
      alert('❌ Limite deve ser um número válido');
      return;
    }

    // Converter datas de DD/MM para YYYY-MM-DD (usar ano atual)
    const hoje=new Date();
    const ano=hoje.getFullYear();
    const converterData=(dd_mm)=>{
      if(!dd_mm||dd_mm.length!==5||dd_mm[2]!=='/'){
        alert('❌ Datas devem estar no formato DD/MM');
        return null;
      }
      const[dd,mm]=dd_mm.split('/');
      const dia=parseInt(dd,10);
      const mes=parseInt(mm,10);
      if(isNaN(dia)||isNaN(mes)||dia<1||dia>31||mes<1||mes>12){
        alert('❌ Data inválida: dia deve ser 1-31, mês deve ser 1-12');
        return null;
      }
      return`${ano}-${mm.padStart(2,'0')}-${dd.padStart(2,'0')}`;
    };

    const dataFech=converterData(novaDataFech);
    const dataVenc=converterData(novaDataVenc);

    if(!dataFech||!dataVenc)return;

    // Atualizar dados locais
    const limite=parseFloat(novoLimite);
    if(!D._limites)D._limites={};
    D._limites[cartaoId]=limite;

    // Buscar fatura mais recente para atualizar
    const faturaMaisRecente=D._faturasRaw
      ?.filter(f=>f.cartao===cartaoId)
      .sort((a,b)=>new Date(b.mes_ref)-new Date(a.mes_ref))[0];

    if(faturaMaisRecente){
      faturaMaisRecente.limite=limite;
      faturaMaisRecente.data_fechamento=dataFech;
      faturaMaisRecente.data_vencimento=dataVenc;
    }

    // Salvar no Supabase
    const sb=getSB();
    if(sb&&faturaMaisRecente){
      
      const{error}=await sb
        .from('nosso_lar_faturas')
        .update({
          limite:limite,
          data_fechamento:dataFech,
          data_vencimento:dataVenc
        })
        .eq('id',faturaMaisRecente.id);

      if(error){
        
        alert('❌ Erro ao salvar no servidor');
        return;
      }
    }

    // Salvar dados e rerender
    saveData();
    await renderCartoesDesktopNovo();

    
    return true;  // Indicar sucesso
  }catch(e){
    
    alert('❌ '+e.message);
    return false;  // Indicar falha
  }
}
