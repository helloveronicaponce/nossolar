<!-- GitHub Pages Refresh -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<meta http-equiv="Pragma" content="no-cache"/>
<meta http-equiv="Expires" content="0"/>
<title>Nosso Lar</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<meta name="theme-color" content="#1DB954"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Nosso Lar"/>
<link rel="apple-touch-icon" id="apple-icon" href=""/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  /* Light mode — verde refinado + neutros com leve viés verde */
  --g:#0e7a58;--gl:#e4f4ec;--gd:#0a5e44;
  --r:#c0473c;--rl:#fbe9e6;
  --a:#b47913;--al:#faf0d9;
  --bg:#f4f7f5;--w:#ffffff;
  --t:#10201a;--t2:#48584f;--t3:#7c8b82;
  --b:#e5ebe7;--b2:#d3ddd7;
  --sh:0 1px 4px rgba(0,0,0,.07),0 4px 16px rgba(0,0,0,.05);
  --overlay:rgba(0,0,0,.5)
}

@media(prefers-color-scheme:dark){
  :root{
    --bg:#0b1310;--w:#131f19;
    --t:#e9f1ec;--t2:#b3c3ba;--t3:#7f9389;
    --b:#233029;--b2:#2f3f36;
    --sh:0 1px 4px rgba(0,0,0,.3),0 10px 30px rgba(0,0,0,.35);
    --overlay:rgba(0,0,0,.8);
    --g:#31c187;--gd:#5bd6a3;--r:#ef7a6d;--a:#e0b256;
    --gl:#12281f;--rl:#2c1512;--al:#2a2312
  }
}

body.dark-mode{
  --bg:#0b1310;--w:#131f19;
  --t:#e9f1ec;--t2:#b3c3ba;--t3:#7f9389;
  --b:#233029;--b2:#2f3f36;
  --sh:0 1px 4px rgba(0,0,0,.3),0 10px 30px rgba(0,0,0,.35);
  --overlay:rgba(0,0,0,.8);
  --g:#31c187;--gd:#5bd6a3;--r:#ef7a6d;--a:#e0b256;
  --gl:#12281f;--rl:#2c1512;--al:#2a2312
}
body{font-family:Inter,sans-serif;background:var(--bg);color:var(--t);font-size:14px;line-height:1.5;min-height:100vh}

/* ── TOPBAR ── */
.top{background:var(--g);padding:0 2rem;padding-top:env(safe-area-inset-top,0px);display:flex;align-items:center;height:calc(64px + env(safe-area-inset-top,0px));position:sticky;top:0;z-index:50;gap:1.5rem;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.logo{font-size:17px;font-weight:800;color:#fff;margin-right:auto;letter-spacing:-.03em}
.mes{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);border-radius:8px;padding:.3rem .75rem;color:#fff;font-family:Inter,sans-serif;font-size:13px;cursor:pointer}
.mes option{background:#158a3e}
.nav-mes{position:relative;display:flex;align-items:center;gap:2px}
.nav-arr{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:6px;color:#fff;font-size:18px;line-height:1;width:26px;height:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;padding:0;font-family:Inter,sans-serif}
.nav-arr:hover{background:rgba(255,255,255,.3)}
.nav-arr:disabled{opacity:.3;cursor:default}
.nav-label{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);border-radius:8px;padding:.28rem .7rem;color:#fff;font-family:Inter,sans-serif;font-size:13px;font-weight:600;cursor:pointer;display:flex;gap:5px;align-items:baseline;white-space:nowrap;transition:background .15s;min-width:110px;justify-content:center}
.nav-label:hover{background:rgba(255,255,255,.3)}
#nav-mes-txt{font-size:13px;font-weight:700}
#nav-ano-txt{font-size:11px;font-weight:500;opacity:.8}
.nav-picker{position:absolute;top:calc(100% + 8px);left:50%;transform:translateX(-50%);background:#fff;border-radius:14px;box-shadow:0 8px 32px rgba(0,0,0,.18);padding:.75rem;z-index:200;min-width:240px;animation:fadeIn .12s ease}
.np-anos{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:.6rem;justify-content:center}
.np-ano{padding:.25rem .7rem;border-radius:8px;border:1.5px solid var(--b);background:var(--w);color:var(--t2);font-family:Inter,sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .12s}
.np-ano:hover{border-color:var(--g);color:var(--g)}
.np-ano.on{background:var(--g);border-color:var(--g);color:#fff}
.np-meses{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
.np-mes{padding:.3rem .2rem;border-radius:8px;border:1.5px solid var(--b);background:var(--w);color:var(--t2);font-family:Inter,sans-serif;font-size:11px;font-weight:600;cursor:pointer;text-align:center;transition:all .12s}
.np-mes:hover:not(:disabled){border-color:var(--g);color:var(--g)}
.np-mes.on{background:var(--g);border-color:var(--g);color:#fff}
.np-mes:disabled{opacity:.28;cursor:default}
.btn{padding:.5rem 1.2rem;border-radius:8px;border:1.5px solid var(--b2);background:var(--w);color:var(--t2);font-family:Inter,sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:.5rem}
.btn:hover{border-color:var(--g);color:var(--g);background:rgba(29,185,84,.02)}
.btn.g{background:var(--g);border-color:var(--g);color:#fff;font-weight:600;box-shadow:0 2px 8px rgba(29,185,84,.3)}
.btn.g:hover{box-shadow:0 4px 12px rgba(29,185,84,.4);transform:translateY(-2px)}

/* ── LAYOUT ── */
.lay{display:grid;grid-template-columns:1fr 300px;gap:1.25rem;padding:1.25rem 1.5rem;max-width:1200px;margin:0 auto}
.main{display:flex;flex-direction:column;gap:1.25rem}
.side{display:flex;flex-direction:column;gap:1.25rem}
.card{background:var(--w);border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.08),0 4px 12px rgba(0,0,0,.04);padding:1.25rem;border:1px solid rgba(229,231,235,.5)}

/* ── SALDO BAR ── */
.sbar{background:var(--w);border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.08),0 4px 12px rgba(0,0,0,.04);padding:1.25rem;display:grid;grid-template-columns:auto 1px auto 1px auto 1px auto 1px auto;align-items:center;gap:1.25rem;border:1px solid rgba(229,231,235,.5)}
.sdiv{width:1px;height:28px;background:var(--b2)}
.slbl{font-size:11px;color:var(--t2);font-weight:500;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px;display:flex;align-items:center;gap:4px}
.sval{font-size:22px;font-weight:700;letter-spacing:-.02em;line-height:1.2}
.sval.g{color:var(--g)}.sval.r{color:var(--r)}
.si .l{font-size:11px;color:var(--t3);font-weight:500;margin-bottom:2px}.si .v{font-size:14px;font-weight:600}
.si .v.g{color:var(--g)}.si .v.r{color:var(--r)}.si .v.a{color:var(--a)}
.tag{font-size:9px;border-radius:3px;padding:1px 5px;font-weight:600}

/* ── ALERTS ── */
.alert{display:flex;align-items:center;gap:.6rem;padding:.5rem 0;background:transparent;border:none;border-radius:0}
.alert+.alert{border-top:1px solid var(--b);padding-top:.7rem}
.alert>span{width:28px;height:28px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;font-size:14px!important;flex-shrink:0;line-height:1;background:var(--bg)}
.alert.warn>span{background:var(--al)}
.alert.danger>span{background:var(--rl)}
.alt{font-size:12.5px;font-weight:600;line-height:1.4;color:var(--t)}.alt span{color:var(--t3);font-weight:500}

/* ── FILTERS ── */
.pills{display:flex;gap:.5rem;flex-wrap:wrap;align-items:center}
.pill{padding:.4rem 1rem;border-radius:99px;border:1.5px solid var(--b2);background:var(--w);color:var(--t2);font-family:Inter,sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:.4rem}
.pill:hover{border-color:var(--g);color:var(--g);background:rgba(29,185,84,.02)}
.pill.on{background:var(--gl);border-color:var(--g);color:var(--g);font-weight:600}
.srch{border:1.5px solid var(--b);border-radius:99px;padding:.45rem 1.2rem;font-size:14px;outline:none;font-family:Inter,sans-serif;color:var(--t);background:var(--w);transition:all .2s;min-width:200px}
.srch::placeholder{color:var(--t3)}
.srch:hover{border-color:var(--b2);background:rgba(244,246,249,.5)}
.srch:focus{border-color:var(--g);background:var(--w);box-shadow:0 0 0 3px rgba(29,185,84,.1)}

/* ── TABLE ── */
.th{display:grid;grid-template-columns:20px 56px 104px minmax(0,2fr) 52px 112px 108px 22px;gap:14px;padding:.4rem .55rem;background:rgba(244,246,249,.8);border-top:1px solid var(--b);border-bottom:2px solid var(--b2);font-weight:600;align-items:center;min-height:24px}
.th span{font-size:10px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.04em;line-height:1}
.tr{display:grid;grid-template-columns:20px 56px 104px minmax(0,2fr) 52px 112px 108px 22px;gap:14px;padding:.6rem .55rem;align-items:center;border-radius:6px;border:1px solid transparent;cursor:default;font-size:12.5px;border-bottom:1px solid var(--b);transition:all .15s;min-height:44px}
.tr:nth-child(even){background:rgba(244,246,249,.25)}
.tr:hover{background:rgba(29,185,84,.05);border-color:var(--g);box-shadow:inset 0 0 0 1px rgba(29,185,84,.1)}
.tr.tod{background:rgba(180,123,18,.05);border-color:transparent}
.tr.atr{background:rgba(192,71,60,.05);border-color:transparent}
.tr.pgo{opacity:.62}
.tr.cor{background:#f0f9ff;border-color:#bae6fd}
.tr.sel{background:#eff6ff!important;border-color:#bfdbfe!important}
.dd{font-size:12px;font-weight:500;color:var(--t2);padding:3px 7px;border-radius:6px;cursor:pointer;border:1.5px solid transparent;display:inline-block;text-align:left;white-space:nowrap}
.dd:hover{background:var(--w);border-color:var(--b2)}.dd.tod{color:var(--a)}.dd.pst{color:var(--r)}
.dc{display:flex;flex-direction:column;min-width:0;gap:2px}
.dn{font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--t);line-height:1}
.dn:hover{color:var(--g)}
.dm{display:flex;gap:2px;margin-top:0;align-items:center;flex-wrap:wrap;line-height:1}
.dobs{font-size:10px;color:var(--t3);background:var(--bg);border-radius:3px;padding:0 3px;line-height:1}
.vd{font-size:12px;font-weight:600;cursor:pointer;text-align:right;white-space:nowrap;line-height:1}
.vd.in{color:var(--g)}.vd.out{color:var(--r)}
.scw{display:flex;align-items:center;justify-content:center}
.chip{border-radius:99px;font-size:11px;font-weight:600;padding:.25rem .7rem;cursor:pointer;white-space:nowrap;border:none;display:inline-flex;align-items:center;gap:.3rem;transition:all .2s;line-height:1}
.chip{font-weight:500}
.chip.pago{background:transparent;color:#3f8f6b;border:1px solid #c4e2d3}
.chip.pendente{background:transparent;color:#a07b3a;border:1px solid #e6d6b2}
.chip.agendado{background:transparent;color:#6083ab;border:1px solid #ccd9ec}
.chip.atrasado{background:transparent;color:#c0655c;border:1px solid #edc8c1}
.pj{font-size:12px;font-weight:500}
.pj.pos{color:var(--g2)}.pj.neg{color:var(--r2)}.pj.zer{color:var(--t3)}
.pb{font-size:10px;border-radius:4px;padding:1px 5px;font-weight:600}
.pb-u{background:var(--bg);color:var(--t3)}
.pb-p{background:var(--bg);color:var(--t2)}
.pb-c{background:var(--al);color:var(--a)}
.ra{display:flex;gap:4px;justify-content:flex-end;opacity:0}
.tr:hover .ra{opacity:1}
.cb-col{display:flex;align-items:center;justify-content:center}
input.row-cb{width:15px;height:15px;accent-color:var(--g);cursor:pointer;opacity:0;transition:opacity .15s}
.tr:hover input.row-cb,.tr.sel input.row-cb{opacity:1}
.ib{width:28px;height:28px;border-radius:6px;border:1.5px solid var(--b);background:var(--w);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;font-family:Inter,sans-serif}
.ib:hover{background:var(--bg)}.ib.del:hover{background:#fee2e2;border-color:#fca5a5;color:#dc2626}
.di{border:1.5px solid var(--g);border-radius:5px;padding:2px 6px;font-size:12px;outline:none;font-family:Inter,sans-serif;width:110px}
/* ── EDIT-DATE POPOVER ── */
.rec-pop{position:absolute;z-index:200;background:var(--w);border-radius:12px;box-shadow:0 4px 24px rgba(0,0,0,.13);border:1.5px solid var(--b);padding:.75rem 1rem;display:flex;flex-direction:column;gap:.5rem;min-width:220px;animation:fadeIn .12s ease}
.rec-pop p{font-size:12px;font-weight:600;color:var(--t2);margin-bottom:2px}
.rec-pop button{border:none;border-radius:8px;padding:.45rem .9rem;font-family:Inter,sans-serif;font-size:12px;font-weight:600;cursor:pointer;text-align:left;transition:background .1s}
.rec-pop .rp-este{background:var(--gl);color:var(--gd)}
.rec-pop .rp-este:hover{background:#d1f5e0}
.rec-pop .rp-seg{background:#eff6ff;color:#1e40af}
.rec-pop .rp-seg:hover{background:#dbeafe}
.rec-pop .rp-cancel{background:var(--bg);color:var(--t2)}
.rec-pop .rp-cancel:hover{background:var(--b)}
.hint{font-size:11px;color:var(--t3);padding:.5rem .75rem;font-style:italic}
.hint strong{color:var(--t2)}
.empty{text-align:center;padding:3rem;color:var(--t3)}
.sdd{position:fixed;background:var(--w);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.15);border:1px solid var(--b);z-index:100;min-width:140px;overflow:hidden}
.sdo{padding:.5rem .85rem;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:.5rem}
.sdo:hover{background:var(--bg)}
.sd{width:10px;height:10px;border-radius:50%}

/* ── BULK BAR ── */
.bulk-bar{display:none;position:sticky;top:calc(56px + env(safe-area-inset-top,0px));z-index:40;background:#1e40af;color:#fff;padding:.6rem 1rem;border-radius:10px;margin:.5rem .5rem 0;align-items:center;gap:.75rem;font-size:13px;font-weight:600;box-shadow:0 4px 12px rgba(30,64,175,.3)}
.bulk-bar.on{display:flex}
.bulk-btn{padding:.35rem .85rem;border-radius:7px;border:none;font-size:12px;font-weight:700;cursor:pointer;font-family:Inter,sans-serif}

/* ── SIDEBAR WIDGETS ── */
.sh{display:flex;align-items:center;gap:.75rem;margin-bottom:.85rem}
.si2{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.st{font-size:14px;font-weight:700}
.ar{display:flex;align-items:center;gap:.6rem;padding:.4rem 0}
.av{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700;flex-shrink:0}
.ai{flex:1}.an{font-size:13px;font-weight:500}.at{font-size:11px;color:var(--t3)}
.av2{font-size:14px;font-weight:700}
.av2.g{color:var(--g)}.av2.r{color:var(--r)}
.cs{display:flex;align-items:center;gap:.6rem;padding:.35rem 0}
.cbw{flex:1;min-width:0}
.cbl{display:flex;justify-content:space-between;font-size:12px;font-weight:500;margin-bottom:3px}
.cbb{height:5px;background:var(--bg);border-radius:99px;overflow:hidden}
.cbf{height:100%;border-radius:99px}
.pb2{height:8px;background:var(--bg);border-radius:99px;overflow:hidden;margin:6px 0}
.pf{height:100%;border-radius:99px}
.ins{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-top:.75rem}
.in2{background:var(--bg);border-radius:8px;padding:.4rem .6rem}
.in2 .l{font-size:10px;color:var(--t3);font-weight:500;margin-bottom:2px}
.in2 .v{font-size:12px;font-weight:700}

/* ── CREDIT CARDS ── */
.cc-item{background:var(--bg);border-radius:7px;padding:.45rem .65rem;margin-top:.35rem}
.cc-lbl{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px}
.cc-val{font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:4px}
.cc-val:hover{opacity:.7}
.cc-val .pe{font-size:10px;opacity:.4}
.cc-inp{font-size:13px;font-weight:700;width:100%;border:1.5px solid var(--g);border-radius:5px;padding:2px 5px;outline:none;background:var(--w);font-family:Inter,sans-serif}
.cc-row{display:grid;grid-template-columns:1fr 1fr;gap:.35rem}

/* ── MODAL ── */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:flex;align-items:center;justify-content:center;padding:1rem}
.mw{background:var(--w);border-radius:16px;width:520px;max-width:95vw;max-height:90vh;overflow-y:auto;padding:1.5rem;display:flex;flex-direction:column;gap:1rem}
.mt{display:flex;justify-content:space-between;align-items:center;font-size:16px;font-weight:700}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
.fg{display:flex;flex-direction:column;gap:4px}
.fg.full{grid-column:1/-1}
.fl{font-size:11px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.05em}
.fi{border:1.5px solid var(--b);border-radius:8px;padding:.5rem .75rem;font-size:13px;outline:none;font-family:Inter,sans-serif;color:var(--t);transition:border-color .15s}
.fi:focus{border-color:var(--g)}
.mf{display:flex;gap:.5rem;justify-content:flex-end;margin-top:.5rem}
.fs{background:var(--bg);border-radius:10px;padding:.85rem;display:flex;flex-direction:column;gap:.6rem}
.fst{font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.05em}
.pr{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.5rem}

/* ── TOOLTIPS ── */
[data-tooltip]{position:relative;cursor:help}
[data-tooltip]:hover::after{content:attr(data-tooltip);position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:var(--t);color:var(--bg);padding:.5rem .75rem;border-radius:6px;font-size:12px;font-weight:500;white-space:nowrap;z-index:1000;box-shadow:0 4px 12px var(--overlay);animation:slideUp .2s ease}
[data-tooltip]:hover::before{content:'';position:absolute;bottom:calc(100% + 2px);left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:var(--t);z-index:1000}

/* ── LOADING & SKELETON ── */
.skeleton{background:linear-gradient(90deg,#f0f0f0 25%,#e0e0e0 50%,#f0f0f0 75%);background-size:200% 100%;animation:shimmer 2s infinite;border-radius:8px}
body.dark-mode .skeleton{background:linear-gradient(90deg,#2d3748 25%,#4a5568 50%,#2d3748 75%)}
.spinner{display:inline-block;width:20px;height:20px;border:3px solid rgba(29,185,84,.2);border-top-color:var(--g);border-radius:50%;animation:spin 0.8s linear infinite}
.loading-overlay{position:absolute;inset:0;background:rgba(255,255,255,.7);display:flex;align-items:center;justify-content:center;border-radius:8px;z-index:10;backdrop-filter:blur(1px)}
body.dark-mode .loading-overlay{background:rgba(15,20,25,.7)}

/* ── TOAST ── */
.toast{position:fixed;bottom:calc(80px + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%);background:#1a1d23;color:#fff;padding:.6rem 1.2rem;border-radius:99px;font-size:13px;font-weight:600;z-index:9999;transition:opacity .4s;white-space:nowrap;font-family:Inter,sans-serif;box-shadow:0 4px 16px rgba(0,0,0,.25);animation:slideDown .3s ease}

/* ── MOBILE TABS ── */
.tab-pane{
  display:none;flex-direction:column;gap:.6rem;
  padding:0 .6rem calc(68px + env(safe-area-inset-bottom,0px)) .6rem;
  animation:slideInUp .25s ease-out;
}
.tab-pane.on{display:flex}
@keyframes slideInUp{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:translateY(0)}
}
.tab-bar{
  display:none;
  position:fixed;bottom:0;left:0;right:0;
  background:#fff;
  border-top:1px solid #f0f0f0;
  z-index:300;
  padding-bottom:env(safe-area-inset-bottom,0px);
  box-shadow:0 -2px 20px rgba(0,0,0,.07);
}
.tab-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:4px;padding:.5rem .25rem .4rem;
  background:none;border:none;cursor:pointer;
  font-family:Inter,sans-serif;font-size:10px;font-weight:600;
  color:#999;transition:all .25s cubic-bezier(.4,0,.2,1);
  -webkit-tap-highlight-color:transparent;
  position:relative;min-height:60px;
}
.tab-btn .ti{font-size:22px;line-height:1;transition:all .25s cubic-bezier(.4,0,.2,1);opacity:.6}
.tab-btn:active{transform:scale(.95)}
.tab-btn.on{color:var(--g);font-weight:700}
.tab-btn.on .ti{opacity:1;transform:scale(1.15)}
.tab-btn.on::before{
  content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:40px;height:3px;background:linear-gradient(90deg,transparent,var(--g),transparent);border-radius:0 0 5px 5px;
  box-shadow:0 0 10px rgba(29,185,84,.3);
}

/* ── MOBILE OVERRIDES ── */
@media(max-width:768px){
  .lay{display:none!important}
  .side{display:none!important}
  #mob-lay{display:flex!important;flex-direction:column;gap:.6rem;padding:.6rem .6rem calc(68px + env(safe-area-inset-bottom,0px))}
  .tab-bar{display:flex!important}
  .top{padding:0 .8rem;padding-top:env(safe-area-inset-top,0px);height:calc(50px + env(safe-area-inset-top,0px));gap:.4rem}
  .logo{font-size:15px;white-space:nowrap}
  .mes{font-size:12px;padding:.22rem .55rem;border-radius:20px;max-width:136px}
  .nav-label{font-size:12px;padding:.22rem .55rem;min-width:90px}
  #nav-mes-txt{font-size:12px}
  #nav-ano-txt{font-size:10px}
  .nav-arr{width:22px;height:22px;font-size:16px}
  #sync-status{display:none}
  .btn.g{font-size:12px;padding:.3rem .75rem;white-space:nowrap;border-radius:20px}
  .bulk-bar{top:calc(50px + env(safe-area-inset-top,0px))!important;margin:.3rem!important;font-size:11px!important;padding:.45rem .75rem!important;border-radius:10px!important}
  .pills{gap:.3rem;flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:2px}
  .pills::-webkit-scrollbar{display:none}
  .pill{font-size:11px;padding:.25rem .65rem;white-space:nowrap;flex-shrink:0}
  .srch{font-size:14px;width:100%;border-radius:10px}
  .hint{font-size:10px!important;padding:.3rem .6rem!important}
  .card{border-radius:12px}
  .sbar{display:block!important;padding:.9rem!important}
  .sdiv{display:none!important}
  .th{display:none!important}
}

/* ── RESPONSIVE ── */
@media(max-width:1280px){
  .page-container{padding:1.25rem 1.5rem}
  .lay{grid-template-columns:1fr;gap:1rem}
}

@media(max-width:1024px){
  .desktop-tabs{padding:0 1.5rem}
  .desktop-tab{padding:.6rem 1rem;font-size:14px}
  .page-container{padding:1.25rem 1.5rem;gap:1rem;max-width:100%}
  .sbar{grid-template-columns:1fr 1fr 1fr;gap:1rem}
  .sdiv{display:none}
  .th{grid-template-columns:32px 60px 1.5fr 80px 65px 50px 32px}
  .tr{grid-template-columns:32px 60px 1.5fr 80px 65px 50px 32px}
}

@media(max-width:900px){.lay{grid-template-columns:1fr}.side{display:none}.sbar{grid-template-columns:1fr 1fr;gap:.75rem}.sdiv{display:none}}

/* ── ACCESSIBILITY ── */
*:focus-visible{outline:2px solid var(--g);outline-offset:2px}
button:focus-visible,a:focus-visible,input:focus-visible,.pill:focus-visible,.desktop-tab:focus-visible{outline:2px solid var(--g);outline-offset:2px}

@media(prefers-reduced-motion:reduce){
  *{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important}
}

/* ── ANIMATIONS ── */
@keyframes spin{0%{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
@keyframes slideInUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes shimmer{0%{background-position:-1000px 0}100%{background-position:1000px 0}}
@keyframes slideUp{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* ── TAB PANES ── */
.tab-pane{display:none;flex-direction:column;gap:.6rem;padding:0 .6rem calc(68px + env(safe-area-inset-bottom,0px)) .6rem;animation:slideInUp .25s ease-out}
.tab-pane.on{display:flex}
.tab-header{display:flex;align-items:center;justify-content:space-between;padding:1rem .75rem;border-bottom:1px solid var(--b);margin-bottom:.6rem;background:var(--w)}
.tab-header .title{font-size:18px;font-weight:700;display:flex;align-items:center;gap:.5rem}
.tab-header .icon{font-size:24px}

/* ── DESKTOP TABS ── */
.desktop-tabs{background:var(--w);border-bottom:1px solid var(--b);padding:0 .5rem;margin:0;display:flex;gap:2px;flex-direction:row;justify-content:center;box-shadow:none}
.desktop-tab{flex:0 0 auto;padding:.7rem 1rem;border:none;background:none;cursor:pointer;font-family:Inter,sans-serif;font-size:14px;font-weight:600;color:var(--t3);transition:color .15s;position:relative;text-decoration:none;display:flex;align-items:center;gap:.4rem}
.desktop-tab:hover{color:var(--t)}
.desktop-tab.active{color:var(--t);font-weight:700}
.desktop-tab.active::after{content:"";position:absolute;left:10px;right:10px;bottom:-1px;height:2.5px;background:var(--g);border-radius:3px}

.page-container{display:none;flex-direction:column;gap:1.25rem;padding:1.5rem 2rem;width:100%;max-width:1400px;margin:0 auto}
.page-container.active{display:flex !important}

@media(min-width:769px){
  .lay{display:none !important}
  .tab-bar{display:none !important}
  .tab-pane{display:none !important}
  #mob-lay{display:none !important}
}
/* ===================== NOVA UI (Visão Geral / Cartões) ===================== */
.tnum{font-variant-numeric:tabular-nums}
.nl-hero{background:var(--w);border:1px solid var(--b);border-radius:20px;box-shadow:var(--sh);padding:1.5rem 1.6rem;display:flex;align-items:center;gap:1.5rem;flex-wrap:wrap;margin-bottom:.9rem}

.nl-pill.ok{background:var(--gl);color:var(--g)}

.nl-chip .lbl{font-size:12px;color:var(--t3);font-weight:600}
.nl-chip .val{font-size:22px;font-weight:800;letter-spacing:-.02em;margin-top:5px;color:var(--t)}
.nl-chip .dl{font-size:12px;font-weight:600;margin-top:3px;display:inline-flex;gap:4px;align-items:center}
.nl-up{color:var(--g)}.nl-down{color:var(--r)}.nl-neg{color:var(--r)}
.nl-sub{display:flex;gap:6px;margin:1.1rem 0 1rem;flex-wrap:wrap}
.nl-schip{border:1.5px solid var(--b);background:var(--w);font-family:Inter,sans-serif;font-size:13px;font-weight:600;color:var(--t2);padding:.5rem .95rem;border-radius:999px;cursor:pointer;transition:all .15s}
.nl-schip:hover{border-color:var(--g);color:var(--g)}
.nl-schip.on{background:var(--g);border-color:var(--g);color:#fff}
.nl-panel{display:none;flex-direction:column;gap:1.1rem}
.nl-panel.on{display:flex}
.nl-cat{display:flex;flex-direction:column;gap:.9rem}
.nl-cat .row{display:grid;grid-template-columns:96px 1fr 126px;align-items:center;gap:.7rem;font-size:13px;font-weight:600}
.nl-cat .track{display:block;height:8px;border-radius:5px;background:var(--bg);overflow:hidden}
.nl-cat .fill{display:block;height:100%;border-radius:5px;background:var(--g)}
.nl-cat .v2{text-align:right;font-weight:700;font-size:13px;color:var(--t)}
.nl-cat .v2 em{color:var(--t3);font-weight:600;font-style:normal;font-size:11.5px;margin-left:5px}
.nl-util .track{display:block;height:8px;border-radius:5px;background:var(--bg);overflow:hidden}
.nl-util .fill{display:block;height:100%;border-radius:5px}
.nl-util .info{display:flex;justify-content:space-between;font-size:11.5px;font-weight:600;color:var(--t3);margin-top:7px}
.nl-alert{display:flex;gap:10px;align-items:center;margin-bottom:.9rem;background:var(--al);color:var(--a);border-radius:14px;padding:.75rem 1rem;font-size:13.5px;font-weight:600}
.nl-alert.bad{background:var(--rl);color:var(--r)}
.nl-alert b{font-weight:800}
.nl-grid2{display:grid;grid-template-columns:1fr 1fr;gap:.9rem}
.nl-grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:.9rem}
.nl-ch{font-size:13px;font-weight:700;margin-bottom:1rem;color:var(--t)}
.nl-ch .sub{font-weight:500;color:var(--t3);font-size:12px;margin-left:6px}
@media(max-width:820px){.nl-chips,.nl-grid3,.nl-grid2{grid-template-columns:1fr}.nl-spark{width:100%}}
/* coluna compacta centralizada (igual ao layout sugerido) */

/* cabeçalho leve — estilo do mockup (fundo claro, texto escuro) */
.top{background:var(--w);border-bottom:1px solid var(--b);box-shadow:0 1px 3px rgba(0,0,0,.04)}

/* ── ROWS with recorrente injection ── */
function rows(){
  const base=D[mes]||[];
  const deletadosIds=new Set(base.filter(x=>x._deletado).map(x=>x.id));
  const result=base.filter(x=>!x._deletado);
  const mesIds=new Set(result.map(x=>x.id));
  Object.entries(D).forEach(([m,arr])=>{
    if(!Array.isArray(arr)||m===mes)return;
    arr.filter(r=>r.recorrente&&!r._recClone&&!r._deletado).forEach(r=>{
      const cloneId='rec_'+r.id+'_'+mes;
      if(deletadosIds.has(cloneId)||mesIds.has(cloneId)||result.find(x=>x.id===cloneId))return;
      const dia=(r.venc||'').slice(8,10)||'01';
      result.push({...r,id:cloneId,venc:mes+'-'+dia,pag:null,status:'pendente',_recClone:r.id,obs:r.obs||''});
    });
  });
  return result;
}

/* ── SALDO ── */
// Retorna o saldo FINAL de um mês (= o que sobrou ao fim do mês)
// Usado como saldo inicial do mês seguinte
function getSaldoFinal(m,depth){
  if((depth||0)>24)return 0; // proteção contra recursão infinita
  const meta=D[m+'_meta']||{};
  // Se o usuário ajustou manualmente o saldo atual deste mês, esse é o saldo final
  if(meta.saldoAtualManual!==undefined)return meta.saldoAtualManual;
  // Caso contrário: saldo inicial do mês + movimentações
  const si=getSI(m,(depth||0)+1);
  const pr=rowsOf(m);
  // Sempre considera todos os lançamentos (pago ou não) — fluxo de caixa completo
  return si+pr.filter(r=>r.tipo==='in').reduce((s,r)=>s+r.valor,0)
            -pr.filter(r=>r.tipo==='out').reduce((s,r)=>s+r.valor,0);
}

// Retorna todos os lançamentos de um mês (incluindo recorrentes injetados) sem alterar global
function rowsOf(m){
  const base=D[m]||[];
  const deletadosIds=new Set(base.filter(x=>x._deletado).map(x=>x.id));
  const result=base.filter(x=>!x._deletado);
  const mesIds=new Set(result.map(x=>x.id));
  Object.entries(D).forEach(([mk,arr])=>{
    if(!Array.isArray(arr)||mk===m)return;
    arr.filter(r=>r.recorrente&&!r._recClone&&!r._deletado).forEach(r=>{
      const cloneId='rec_'+r.id+'_'+m;
      if(deletadosIds.has(cloneId)||mesIds.has(cloneId)||result.find(x=>x.id===cloneId))return;
      const dia=(r.venc||'').slice(8,10)||'01';
      result.push({...r,id:cloneId,venc:m+'-'+dia,pag:null,status:'pendente',_recClone:r.id,obs:r.obs||''});
    });
  });
  return result;
}

// Retorna o saldo INICIAL de um mês (= saldo final do mês anterior)
function getSI(m,depth){
  if((depth||0)>24)return 0;
  const prev=addM(m,-1);
  // Se não há nenhum dado no mês anterior, começa do zero
  if(!D[prev]&&!D[prev+'_meta'])return 0;
  return getSaldoFinal(prev,(depth||0)+1);
}

  }
}

/* ── PROJECTED ── */
// sAtual = saldo já realizado (inicial + pagos). Os pendentes são projetados em ordem de vencimento.
function calcProj(all,sAtual){
  const unpaid=all.filter(r=>r.status!=='pago').sort((a,b)=>(a.venc||'').localeCompare(b.venc||''));
  let run=sAtual;
  const p={};unpaid.forEach(r=>{if(r.tipo==='in')run+=r.valor;else run-=r.valor;p[r.id]=run;});return p;
}

  const headerEl=document.getElementById('lanc-header-mes');
  if(headerEl)headerEl.textContent=MN[+mes.slice(5)-1];
  closeDd();
  const all=rows();let list=[...all];
  const srchEl=document.getElementById('srch')||document.getElementById('srch-m');
  const q=(srchEl?.value||'').toLowerCase();
  if(q)list=list.filter(r=>r.desc.toLowerCase().includes(q)||(r.obs||'').toLowerCase().includes(q));
  list=list.filter(r=>filtSet.has(r.status));
  if(ocultarPagos)list=list.filter(r=>r.status!=='pago');
  list.sort((a,b)=>{
    const da=a.status==='pago'?(a.pag||a.venc||''):(a.venc||'');
    const db=b.status==='pago'?(b.pag||b.venc||''):(b.venc||'');
    return da.localeCompare(db);
  });
  const tIn=all.filter(r=>r.tipo==='in').reduce((s,r)=>s+r.valor,0);
  const tOut=all.filter(r=>r.tipo==='out').reduce((s,r)=>s+r.valor,0);

  const sAtualCalc=si+pIn-pOut;
  const sAtual=metaM.saldoAtualManual!==undefined?metaM.saldoAtualManual:sAtualCalc;
  // Saldo final = saldo atual + pendentes (projeção)
  const pendIn=all.filter(r=>r.tipo==='in'&&r.status!=='pago').reduce((s,r)=>s+r.valor,0);
  const pendOut=all.filter(r=>r.tipo==='out'&&r.status!=='pago').reduce((s,r)=>s+r.valor,0);

function buildChartCartaoComFiltro(cartoes,data){
  try{
  if(!data||!data.length||!data.some(d=>d.total>0))return '<div style="text-align:center;padding:1.5rem 1rem;color:var(--t3);font-size:12px">Sem dados ainda. Registre faturas para ver o gráfico.</div>';

  const filtrado=_filtroCartaoGrafico==='todos'?cartoes:cartoes.filter(c=>c.id===_filtroCartaoGrafico);
  const W=320,H=200,PL=40,PR=8,PT=16,PB=32;
  const cW=W-PL-PR,cH=H-PT-PB;
  const maxVal=Math.max.apply(null,data.map(d=>{
    if(_filtroCartaoGrafico==='todos')return d.total;
    return filtrado.reduce((s,c)=>s+(d.totByCard[c.id]||0),0);
  }).concat([1]));

  const n=data.length;
  const bW=Math.max(6,Math.min(22,Math.floor(cW/n*0.7)));
  const gap=cW/n;
  const MNA=['J','F','M','A','M','J','J','A','S','O','N','D'];
  let s='';
  [0,0.25,0.5,0.75,1].forEach(function(p){
    const y=PT+cH-p*cH;
    const lbl=maxVal*p>=1000?(maxVal*p/1000).toFixed(0)+'k':Math.round(maxVal*p);
    s+='<line x1="'+PL+'" y1="'+y.toFixed(1)+'" x2="'+(W-PR)+'" y2="'+y.toFixed(1)+'" stroke="#e5e7eb" stroke-width="0.5"/>';
    s+='<text x="'+(PL-4)+'" y="'+(y+3).toFixed(1)+'" text-anchor="end" font-family="Inter,sans-serif" font-size="8" fill="#9ca3af">'+lbl+'</text>';
  });

  data.forEach(function(d,i){
    const bx=PL+i*gap+(gap-bW)/2;
    let sy=PT+cH;
    let temDado=false;
    filtrado.forEach(function(c){
      const v=d.totByCard[c.id]||0;
      if(v>0){temDado=true;const h=Math.max(2,(v/maxVal)*cH);sy-=h;s+='<rect x="'+bx.toFixed(1)+'" y="'+sy.toFixed(1)+'" width="'+bW+'" height="'+h.toFixed(1)+'" fill="'+c.cor+'" rx="1.5" opacity="0.85">'+'<title>'+c.nome+': '+fv(v)+'</title>'+'</rect>';}
    });
    const lbl=MNA[(+d.mes.slice(5)-1)];
    s+='<text x="'+(bx+bW/2).toFixed(1)+'" y="'+(H-PB+16).toFixed(1)+'" text-anchor="middle" font-family="Inter,sans-serif" font-size="8" fill="#9ca3af" font-weight="500">'+lbl+'</text>';
  });

  return '<svg viewBox="0 0 '+W+' '+H+'" width="100%" style="display:block">'+s+'</svg>';
  }catch(e){console.error('Erro em buildChartCartaoComFiltro:',e);return '<div style="padding:1rem;color:red">Erro ao renderizar gráfico: '+e.message+'</div>';}
}

function buildCardBars(cid,data){
  const last=data.slice(-6);
  if(!last.length||!last.some(d=>(d.totByCard[cid]||0)>0))return '';
  const vals=last.map(d=>d.totByCard[cid]||0);
  const meses=last.map(d=>d.mes);
  const max=Math.max(...vals,1);
  const W=288,H=50,n=vals.length,gap=3;
  const bW=Math.max(4,Math.floor((W-gap*(n-1))/n));
  const MNA=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  const cartao=getCartoes().find(c=>c.id===cid);const cor=(cartao&&cartao.cor)||'var(--a)';
  let bars='';
  vals.forEach((v,i)=>{
    const h=Math.max(2,(v/max)*(H-16));
    const x=i*(bW+gap);
    bars+=`<rect x="${x.toFixed(1)}" y="${(H-16-h).toFixed(1)}" width="${bW}" height="${h.toFixed(1)}" fill="${cor}" rx="2" opacity="${v>0?0.88:0.15}"/>`;
    const lbl=MNA[(+meses[i].slice(5)-1)];
    bars+=`<text x="${(x+bW/2).toFixed(1)}" y="${H-2}" text-anchor="middle" font-size="8" font-family="Inter,sans-serif" fill="#9ca3af">${lbl}</text>`;
    if(v>0){const tv=v>=1000?(v/1000).toFixed(1)+'k':Math.round(v);bars+=`<text x="${(x+bW/2).toFixed(1)}" y="${(H-18-h).toFixed(1)}" text-anchor="middle" font-size="7.5" font-family="Inter,sans-serif" fill="#6b7280" font-weight="600">${tv}</text>`;}
  });
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block;margin:.4rem 0 .1rem">${bars}</svg>`;
}

function renderGestaoCartoes(){

  const hoje=new Date();
  const data=buildGestaoData();
  const totalLimite=cartoes.reduce((s,c)=>s+getLimite(c.id),0);
  const totalFat=cartoes.reduce((s,c)=>s+getFatura(c.id),0);
  const totalDisp=totalLimite>0?totalLimite-totalFat:0;
  const pctGlobal=totalLimite>0?Math.min(100,Math.round((totalFat/totalLimite)*100)):null;
  const last6=data.slice(-6);
  const media=last6.length?Math.round(last6.reduce((s,d)=>s+d.total,0)/last6.length):0;

  // Ordenar: abertos/fechados primeiro → sem fatura → pagos
  const cartoesSort=[...cartoes].sort((a,b)=>{
    const fa=getFatura(a.id),fb=getFatura(b.id);
    const la=(D[mes]||[]).find(r=>r.id==='cc_'+a.id+'_'+mes);
    const lb=(D[mes]||[]).find(r=>r.id==='cc_'+b.id+'_'+mes);
    const pa=!!(la&&la.status==='pago'),pb=!!(lb&&lb.status==='pago');
    if(pa!==pb)return pa?1:-1;
    if((fa>0)!==(fb>0))return fa>0?-1:1;
    const clA=(fa>0&&diaHoje>=a.fechamento)?1:0;
    const clB=(fb>0&&diaHoje>=b.fechamento)?1:0;
    return clB-clA;
  });

/* ── EDIT CARTÃO ── */
function syncCartaoLancamento(c){
  const fatura=getFatura(c.id);
  if(!fatura||fatura<=0){if(D[mes])D[mes]=D[mes].filter(r=>r.id!=='cc_'+c.id+'_'+mes);return;}
  const[ano,mo]=mes.split('-');const dia=String(c.vencimento).padStart(2,'0');
  const vencDate=ano+'-'+mo+'-'+dia;const lancId='cc_'+c.id+'_'+mes;
  if(!D[mes])D[mes]=[];const idx=D[mes].findIndex(r=>r.id===lancId);
  const lanc={id:lancId,tipo:'out',venc:vencDate,pag:null,desc:'Pagamento de fatura - '+c.nome,cat:'Cartões',valor:fatura,status:'pendente',obs:'Fatura '+c.nome+' — fechamento dia '+c.fechamento,parcelas:1,parcelaAtual:1};
  if(idx>=0){if(D[mes][idx].status!=='pago')Object.assign(D[mes][idx],lanc);else D[mes][idx].valor=fatura;}
  else D[mes].push(lanc);
}
function editCartao(cid,field,el){
  if(el.querySelector('input'))return;
  const cartoes=getCartoes();const c=cartoes.find(x=>x.id===cid);if(!c)return;
  const isFatura=field==='fatura';
  const inp=document.createElement('input');inp.type='number';inp.value=isFatura?getFatura(cid).toFixed(2):c[field];
  inp.step=isFatura?'0.01':'1';inp.min='0';if(!isFatura)inp.max='31';inp.className='cc-inp';
  el.innerHTML='';el.appendChild(inp);inp.focus();inp.select();
  const commit=()=>{const v=parseFloat(inp.value);if(!isNaN(v)&&v>=0){if(isFatura){setFatura(cid,+v.toFixed(2));}else{c[field]=Math.max(1,Math.min(31,Math.round(v)));D['_cartoes']=cartoes;}syncCartaoLancamento(c);saveData();}render();renderSide();};
  inp.addEventListener('blur',commit);inp.addEventListener('keydown',ev=>{if(ev.key==='Enter')inp.blur();if(ev.key==='Escape')renderSide();});inp.addEventListener('click',ev=>ev.stopPropagation());
}
function pagarFaturaCartao(cid){
  const cartoes=getCartoes();const c=cartoes.find(x=>x.id===cid);if(!c)return;
  const lancId='cc_'+c.id+'_'+mes;if(!D[mes])D[mes]=[];

      ev.stopPropagation();

        const override={...r,status:o.v,pag:o.v==='pago'?today():r.pag||null};
        const existIdx=D[mes].findIndex(x=>x.id===id);
        if(existIdx>=0)D[mes][existIdx]=override;else D[mes].push(override);
      } else {
        const idx=D[mes].findIndex(r2=>r2.id===id);if(idx<0)return;
        D[mes][idx].status=o.v;if(o.v==='pago')D[mes][idx].pag=today();
        if(o.v!=='pago')D[mes][idx].pag=null;
      }
      saveData();render();renderSide();closeDd();
    });
    el.appendChild(d);
  });
  // captura posição antes de qualquer mudança no DOM
  const chipRect=e.currentTarget.getBoundingClientRect();
  const clickY=e.clientY||chipRect.bottom;
  const clickX=e.clientX||chipRect.left;
  // insere fora da tela para medir
  el.style.top='-9999px';el.style.left='-9999px';
  document.body.appendChild(el);dd=el;
  // mede após reflow
  const ddH=el.offsetHeight;
  const ddW=el.offsetWidth;
  // posiciona: abre abaixo do chip se couber, senão acima
  const spaceBelow=window.innerHeight-chipRect.bottom-4;
  const top=spaceBelow>=ddH?chipRect.bottom+4:Math.max(4,chipRect.top-ddH-4);
  const left=Math.min(Math.max(4,clickX-20),window.innerWidth-ddW-8);
  el.style.top=top+'px';el.style.left=left+'px';
  setTimeout(()=>document.addEventListener('click',function h(ev2){
    if(el.contains(ev2.target))return;
    closeDd();document.removeEventListener('click',h);
  }),10);
}

function editDate(e,id){
  e.stopPropagation();const el=e.currentTarget;
  // Busca o lançamento — pode estar no mês atual ou ser um clone virtual
  const rInMes=(D[mes]||[]).find(x=>x.id===id);

  if(!r)return;

  const inp=document.createElement('input');inp.type='date';inp.value=(isPago?r.pag:r.venc)||'';inp.className='di';

  // Wrapper relativo para poder posicionar o popover
  const wrap=document.createElement('span');wrap.style.position='relative';
  el.replaceWith(wrap);wrap.appendChild(inp);inp.focus();

  let committed=false;

  const applyDate=(value,scope)=>{
    if(committed)return;committed=true;
    if(value)patchDate(id,field,value,scope,r);else render();
  };

    bSeg.onclick=(ev)=>{ev.stopPropagation();pop.remove();applyDate(value,'seguintes');};
    bCan.onclick=(ev)=>{ev.stopPropagation();pop.remove();render();};
    // Fecha ao clicar fora
    setTimeout(()=>document.addEventListener('click',function h(ev){if(!pop.contains(ev.target)){pop.remove();if(!committed)render();document.removeEventListener('click',h);}},{once:false}),10);
  };

  const onCommit=()=>{
    if(committed)return;
    const value=inp.value;
    if(!value){render();return;}
    if(isRec&&field==='venc'){
      showRecPop(value);

/* ── PATCH VAL (recorrentes com escopo) ── */
function patchVal(id,value,scope,rOrig){
  const isClone=!!(rOrig&&rOrig._recClone);
  const paiId=isClone?rOrig._recClone:id;
  if(scope==='seguintes'){
    Object.entries(D).forEach(([m,arr])=>{
      if(!Array.isArray(arr))return;
      const i=arr.findIndex(r=>r.id===paiId&&r.recorrente&&!r._recClone);
      if(i>=0)D[m][i].valor=value;
    });
    Object.keys(D).forEach(m=>{
      if(m<mes)return;
      if(!Array.isArray(D[m]))return;
      D[m].forEach((r,i)=>{if(r._recClone===paiId)D[m][i].valor=value;});
    });
    saveData();render();renderSide();return;
  }
  if(!D[mes])D[mes]=[];
  const existIdx=D[mes].findIndex(r=>r.id===id);
  if(existIdx>=0){D[mes][existIdx].valor=value;}
  else{D[mes].push({...rOrig,valor:value});}
  saveData();render();renderSide();
}

/* ── PATCH ── */
function patch(id,field,value){
  if(!D[mes])return;const idx=D[mes].findIndex(r=>r.id===id);if(idx<0)return;
  if(field==='venc'&&value){
    const newMes=value.slice(0,7);
    if(newMes!==mes){
      const entry={...D[mes][idx],venc:value};D[mes].splice(idx,1);
      if(!D[newMes])D[newMes]=[];D[newMes].push(entry);
      saveData();render();renderSide();return;
    }
  }
  if(field==='pag'&&value){const newMes=value.slice(0,7);if(newMes!==mes){const entry={...D[mes][idx],pag:value};D[mes].splice(idx,1);if(!D[newMes])D[newMes]=[];D[newMes].push(entry);saveData();render();renderSide();return;}}
  D[mes][idx][field]=value;saveData();render();renderSide();
}

/* ── PATCH DATE (recorrentes com escopo) ── */
function patchDate(id,field,value,scope,rOrig){
  // scope: 'este' = só este mês | 'seguintes' = este + todos os meses futuros
  const isClone=!!(rOrig&&rOrig._recClone);
  const paiId=isClone?rOrig._recClone:id;
  const newDay=value.slice(8,10); // "DD" da nova data

  if(scope==='seguintes'&&field==='venc'){
    // 1. Atualiza o dia do lançamento pai (recorrente original)
    let paiMes=null,paiIdx=-1;
    Object.entries(D).forEach(([m,arr])=>{
      if(!Array.isArray(arr))return;
      const i=arr.findIndex(r=>r.id===paiId&&r.recorrente&&!r._recClone);
      if(i>=0){paiMes=m;paiIdx=i;}
    });
    if(paiMes!==null&&paiIdx>=0){
      const paiVenc=D[paiMes][paiIdx].venc||'';
      D[paiMes][paiIdx].venc=paiVenc.slice(0,8)+newDay;
    }
    // 2. Remove overrides explícitos de meses futuros (clones gravados) cujo dia divergia
    //    para que passem a usar o novo dia padrão do pai
    Object.keys(D).forEach(m=>{
      if(m<=mes&&m!==mes)return; // só meses >= atual
      if(!Array.isArray(D[m]))return;
      D[m]=D[m].filter(r=>!(r._recClone===paiId&&m!==paiMes));
    });
    // 3. Se este mês já tem um clone gravado com dia diferente, atualiza ou remove
    if(D[mes]){
      const ciIdx=D[mes].findIndex(r=>r.id===id||(r._recClone===paiId));
      if(ciIdx>=0){
        D[mes][ciIdx].venc=mes+'-'+newDay;
      }
    }
    saveData();render();renderSide();
    return;
  }

  // scope === 'este': cria/atualiza um override explícito só neste mês
  if(field==='venc'){
    if(!D[mes])D[mes]=[];
    // Se o lançamento já está gravado neste mês, atualiza normalmente
    const existIdx=D[mes].findIndex(r=>r.id===id);
    if(existIdx>=0){
      const newMes=value.slice(0,7);
      if(newMes!==mes){
        const entry={...D[mes][existIdx],venc:value};D[mes].splice(existIdx,1);
        if(!D[newMes])D[newMes]=[];D[newMes].push(entry);
        saveData();render();renderSide();return;
      }
      D[mes][existIdx].venc=value;
      saveData();render();renderSide();
      return;
    }
    // É um clone virtual — grava um override explícito neste mês
    if(isClone&&rOrig){
      const override={...rOrig,id:id,_recClone:paiId,venc:value,pag:null,status:rOrig.status||'pendente'};
      D[mes].push(override);
      saveData();render();renderSide();
      return;
    }
  }
  // Fallback: patch simples
  patch(id,field,value);
}

}

function recalc(){

  const vt=document.querySelector('input[name="vt"]:checked')?.value||'parcela';

  let vraw=parseFloat(document.getElementById('f-val').value)||0;
  if(pt==='parcelado'){const vt=document.querySelector('input[name="vt"]:checked')?.value||'parcela';if(vt==='total')vraw=+(vraw/parcelas).toFixed(2);}
  const isRec=document.getElementById('f-rec')?.checked||false;
  const item={tipo:document.getElementById('f-tipo').value,status:document.getElementById('f-status').value,venc:document.getElementById('f-venc').value,pag:document.getElementById('f-pag').value||null,desc:document.getElementById('f-desc').value.trim(),cat:document.getElementById('f-cat').value,valor:vraw,obs:document.getElementById('f-obs').value.trim(),parcelas,parcelaAtual:pa,recorrente:isRec||undefined};
  if(!item.desc){alert('Informe uma descrição');return;}
  if(!D[mes])D[mes]=[];
  if(eid){const idx=D[mes].findIndex(x=>x.id===eid);if(idx>=0)Object.assign(D[mes][idx],item);}
  else{D[mes].push({...item,id:uid()});if(criar&&pa<parcelas){for(let i=pa+1;i<=parcelas;i++){const fm=addM(mes,i-pa);if(!D[fm])D[fm]=[];D[fm].push({...item,parcelaAtual:i,status:'pendente',pag:null,venc:sameDay(item.venc,fm),id:uid()});}}}
  closeModal();saveData();render();renderSide();
}

function copyToClipboard(el){
  el.select();
  document.execCommand('copy');
}

function downloadFile(content,filename,type){
  const blob=new Blob([content],{type});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=filename;
  a.click();
  URL.revokeObjectURL(url);
  toast('📥 Arquivo baixado!');
}

/* ── NOTIFICAÇÕES INTELIGENTES ── */
function checkCartaoAlerts(){
  const cartoes=getCartoes();
  cartoes.forEach(cartao=>{
    const fatura=((D._faturas||{})[mes]||{})[cartao.id]||0;
    const limite=((D._limites||{})[cartao.id]||0);
    if(limite>0){
      const percentual=(fatura/limite)*100;
      if(percentual>=90){
        const notif=document.createElement('div');
        notif.className='alert danger';
        notif.innerHTML=`<span>⚠️</span><div class="alt"><strong>${cartao.nome}:</strong> ${percentual.toFixed(0)}% do limite utilizado!</div>`;
        const alertsEl=document.getElementById('alerts');
        if(alertsEl&&!alertsEl.querySelector(`[data-card="${cartao.id}"]`)){
          notif.setAttribute('data-card',cartao.id);
          alertsEl.appendChild(notif);
          setTimeout(()=>notif.remove(),8000);
        }
      }
    }
  });
}

/* ── DESKTOP PAGE NAVIGATION ── */
function switchPage(page){

  // Atualizar abas ativas
  document.querySelectorAll('.desktop-tab').forEach(tab=>{
    const isActive=tab.dataset.page===page;
    tab.classList.toggle('active',isActive);
    tab.setAttribute('aria-selected',isActive);
  });

  // Mostrar/ocultar páginas
  document.querySelectorAll('.page-container').forEach(container=>{
    container.classList.remove('active');
    container.style.display='none';
  });

  const pageEl=document.getElementById('page-'+page);
  if(pageEl){
    pageEl.classList.add('active');
    pageEl.style.display='flex';

    // Renderizar imediatamente (sem delay)
    try{
      if(page==='lancamentos'){
        renderLancamentosDesktop();
      } else if(page==='cartoes'){
        renderCartoesDesktopNovo();
        checkCartaoAlerts();
      } else if(page==='visao-geral'){
        renderVisaoGeralDesktopNovo();
      } else if(page==='patrimonio'){
        renderPatrimonioPage();
      }
    } catch(e){
      console.error('❌ Erro ao renderizar página:', e);
      pageEl.innerHTML='<div class="card" style="padding:2rem;text-align:center;color:var(--r)">Erro ao carregar página</div>';
    }
  }
}

        if(ev.key==='ArrowLeft')nextIdx=(idx-1+tabs.length)%tabs.length;
        if(ev.key==='Home')nextIdx=0;
        if(ev.key==='End')nextIdx=tabs.length-1;

        if(nextIdx!==idx){
          ev.preventDefault();
          tabs[nextIdx].focus();
          tabs[nextIdx].click();
        }
      });
    });
  }
});

/* ── C4 Evolução da Fatura + C5 Projeção da Próxima ── */
function renderEvolucaoFatura(){
  const el=document.getElementById('evolucao-fatura');if(!el)return;
  const fa=D._faturas||{};
  const MN=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
  const meses=Object.keys(fa).filter(m=>/^\d{4}-\d{2}$/.test(m)).sort().slice(-6);
  const dados=meses.map(m=>({m,total:Object.values(fa[m]||{}).reduce((a,v)=>a+(typeof v==='number'?v:0),0)}));
  if(!dados.length){el.innerHTML='<div style="color:var(--t3);text-align:center;padding:1rem;font-size:13px">Sem histórico de faturas</div>';return;}
  const ult3=dados.slice(-3).map(x=>x.total).filter(v=>v>0);
  const proj=ult3.length?Math.round(ult3.reduce((a,v)=>a+v,0)/ult3.length):0;
  const max=Math.max(1,...dados.map(x=>x.total),proj);
  el.innerHTML='<div style="display:flex;align-items:flex-end;justify-content:space-around;gap:.4rem;height:130px">'
    +dados.map(x=>{const h=Math.round(x.total/max*115);const lbl=MN[parseInt(x.m.slice(5),10)-1]+'/'+x.m.slice(2,4);return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;min-width:0"><div title="${fv(x.total)}" style="width:60%;max-width:26px;height:${h}px;min-height:2px;background:var(--r);border-radius:4px 4px 0 0"></div><div style="font-size:9px;color:var(--t3);margin-top:2px">${lbl}</div></div>`;}).join('')
    +`<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%"><div title="Projeção ${fv(proj)}" style="width:60%;max-width:26px;height:${Math.round(proj/max*115)}px;min-height:2px;background:var(--a);opacity:.5;border:1px dashed var(--a);border-radius:4px 4px 0 0"></div><div style="font-size:9px;color:var(--a);margin-top:2px;font-weight:700">prev</div></div>`
    +'</div>'
    +`<div style="text-align:center;font-size:12px;color:var(--t3);margin-top:.6rem">Próxima fatura estimada: <b style="color:var(--a)">${fv(proj)}</b> <span style="font-size:10px">(média dos últimos meses)</span></div>`;
}

/* ── C1+C2+C3: RESUMO CONSOLIDADO + ALERTAS DE VENCIMENTO + UTILIZAÇÃO ── */
function renderCartoesResumo(){
  const cartoes=getCartoes();
  const diaHoje=new Date().getDate();
  let totFat=0,totPago=0,totPend=0;
  const alertasVenc=[],alertasUtil=[];
  cartoes.forEach(c=>{
    const fat=getFatura(c.id);
    const lanc=(D[mes]||[]).find(r=>r.id==='cc_'+c.id+'_'+mes);
    const pago=lanc&&lanc.status==='pago';
    totFat+=fat;
    if(pago)totPago+=fat;else if(fat>0)totPend+=fat;
    const venc=parseInt(c.vencimento)||0;
    if(fat>0&&!pago&&venc>0){
      const dias=venc-diaHoje;
      if(dias<0)alertasVenc.push({c,fat,venc,tipo:'vencida'});
      else if(dias<=3)alertasVenc.push({c,fat,venc,tipo:'proxima',dias});
    }
    const lim=getLimite(c.id);
    if(lim>0){const pct=Math.round(fat/lim*100);if(pct>=85)alertasUtil.push({c,pct,lim});}
  });
  const proxVenc=cartoes.map(c=>{const l=(D[mes]||[]).find(r=>r.id==='cc_'+c.id+'_'+mes);const pg=l&&l.status==='pago';return (getFatura(c.id)>0&&!pg)?(parseInt(c.vencimento)||99):null;}).filter(v=>v!==null).sort((a,b)=>a-b)[0];
  let html='<div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:.75rem;margin-bottom:1rem">'
    +`<div class="card" style="padding:1rem"><div style="font-size:10px;color:var(--t3);text-transform:uppercase;font-weight:600;margin-bottom:4px">Total das faturas</div><div style="font-size:20px;font-weight:800;color:var(--t)">${fv(totFat)}</div></div>`
    +`<div class="card" style="padding:1rem"><div style="font-size:10px;color:var(--t3);text-transform:uppercase;font-weight:600;margin-bottom:4px">Já pago</div><div style="font-size:20px;font-weight:800;color:var(--g)">${fv(totPago)}</div></div>`
    +`<div class="card" style="padding:1rem"><div style="font-size:10px;color:var(--t3);text-transform:uppercase;font-weight:600;margin-bottom:4px">A pagar</div><div style="font-size:20px;font-weight:800;color:${totPend>0?'var(--a)':'var(--t3)'}">${fv(totPend)}</div></div>`
    +`<div class="card" style="padding:1rem"><div style="font-size:10px;color:var(--t3);text-transform:uppercase;font-weight:600;margin-bottom:4px">Próximo venc.</div><div style="font-size:20px;font-weight:800;color:var(--t)">${proxVenc?('dia '+proxVenc):'—'}</div></div>`
    +'</div>';
  if(alertasVenc.length){
    html+='<div class="card" style="padding:.85rem 1rem;margin-bottom:.75rem;border-left:4px solid var(--r)"><div style="font-size:12px;font-weight:700;color:var(--r);margin-bottom:.4rem">⚠️ Vencimentos</div>'
      +alertasVenc.map(a=>`<div style="display:flex;justify-content:space-between;font-size:13px;padding:.2rem 0"><span>${a.c.emoji||'💳'} ${a.c.nome} — <b style="color:${a.tipo==='vencida'?'var(--r)':'var(--a)'}">${a.tipo==='vencida'?'venceu dia '+a.venc:'vence dia '+a.venc+' ('+a.dias+'d)'}</b></span><span style="font-weight:700">${fv(a.fat)}</span></div>`).join('')
      +'</div>';
  }
  if(alertasUtil.length){
    html+='<div class="card" style="padding:.85rem 1rem;margin-bottom:.75rem;border-left:4px solid var(--a)"><div style="font-size:12px;font-weight:700;color:var(--a);margin-bottom:.4rem">📊 Limite quase no teto</div>'
      +alertasUtil.map(a=>`<div style="display:flex;justify-content:space-between;font-size:13px;padding:.2rem 0"><span>${a.c.emoji||'💳'} ${a.c.nome}</span><span style="font-weight:700;color:${a.pct>=100?'var(--r)':'var(--a)'}">${a.pct}% de ${fv(a.lim)}</span></div>`).join('')
      +'</div>';
  }
  return html;
}

function _faturaHistoricoHtml(cid){

}

  const max=Math.max(...dados.map(d=>d.fat));

function _faturaPdfUrl(cardId){ return (D._faturaPdf&&D._faturaPdf[cardId+'_'+mes])||''; }
function anexarFaturaPDF(cardId){
  const inp=document.createElement('input');
  inp.type='file'; inp.accept='application/pdf'; inp.style.display='none';
  inp.onchange=async()=>{
    const f=inp.files&&inp.files[0]; if(!f){inp.remove();return;}
    const sb=getSB();
    if(!sb||!_session){ toast('Faça login para anexar faturas'); inp.remove(); return; }
    try{
      toast('Enviando fatura…');
      const path=cardId+'/'+mes+'_'+Date.now()+'.pdf';
      const up=await sb.storage.from('faturas').upload(path,f,{upsert:true,contentType:'application/pdf'});
      if(up.error)throw up.error;
      const url=sb.storage.from('faturas').getPublicUrl(path).data.publicUrl;
      if(!D._faturaPdf)D._faturaPdf={}; D._faturaPdf[cardId+'_'+mes]=url;
      saveData(); toast('Fatura anexada ✓'); if(typeof render==='function')render();

/* ── sparkline SVG a partir de uma série de valores ── */
let _nlSparkN=0;
function _nlSpark(vals,w,h,color){
  color=color||'var(--g)';
  if(!vals||vals.length<2)return '';
  const id='nlsg'+(++_nlSparkN);
  const min=Math.min(...vals),max=Math.max(...vals),rng=(max-min)||1;
  const pts=vals.map((v,i)=>[i/(vals.length-1)*w, h-((v-min)/rng)*(h-8)-4]);
  const line=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ');
  const last=pts[pts.length-1];
  return '<svg class="nl-spark" viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="none" aria-hidden="true"><defs><linearGradient id="'+id+'" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="'+color+'" stop-opacity=".2"/><stop offset="1" stop-color="'+color+'" stop-opacity="0"/></linearGradient></defs><path d="'+line+' L'+w+','+h+' L0,'+h+' Z" fill="url(#'+id+')"/><path d="'+line+'" fill="none" stroke="'+color+'" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="'+last[0].toFixed(1)+'" cy="'+last[1].toFixed(1)+'" r="3.3" fill="'+color+'"/></svg>';
}

function _dividasResumoCard(){
  const arr=_dividasArr();
  const totalDevendo=arr.reduce((s,d)=>s+Math.max(0,_divTotal(d)-_divPagas(d))*_divParcela(d),0);
  const comprometido=arr.reduce((s,d)=>s+((_divTotal(d)-_divPagas(d))>0?_divParcela(d):0),0);
  const MNs=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
  const p=mes.split('-').map(Number);
  let ultimaOff=0; arr.forEach(d=>{const rest=Math.max(0,_divTotal(d)-_divPagas(d));if(rest>ultimaOff)ultimaOff=rest;});
  let ultima='—';
  if(ultimaOff>0){const i=(p[1]-1)+ultimaOff;ultima=MNs[i%12]+'/'+(p[0]+Math.floor(i/12));}
  const card=document.createElement('div');card.className='card';
  card.innerHTML='<div class="nl-ch">Resumo de dívidas</div>'
    +'<div style="display:flex;flex-direction:column;gap:.75rem;font-size:13px">'

    +'<div style="display:flex;justify-content:space-between"><span style="color:var(--t3)">Comprometido por mês</span><span style="font-weight:700;color:var(--t)">'+fv(comprometido)+'</span></div>'
    +'<div style="display:flex;justify-content:space-between"><span style="color:var(--t3)">Quita a última em</span><span style="font-weight:700;color:var(--g)">'+ultima+'</span></div>'

function _investAlocCard(){
  const list=D._investimentos||[];
  const byTipo={};
  list.forEach(i=>{const t=i.tipo||'Outros';byTipo[t]=(byTipo[t]||0)+((i.valor_atual!=null?i.valor_atual:i.valor)||0);});
  const arr=Object.entries(byTipo).sort((a,b)=>b[1]-a[1]);
  const tot=arr.reduce((s,e)=>s+e[1],0)||1;
  const card=document.createElement('div');card.className='card';
  card.innerHTML='<div class="nl-ch">Alocação de investimentos</div>'
    +(arr.length?'<div class="nl-cat">'+arr.map(e=>'<div class="row"><span>'+e[0]+'</span><span class="track"><span class="fill" style="width:'+(e[1]/tot*100)+'%"></span></span><span class="v2 tnum">'+fv(e[1])+' <em>'+Math.round(e[1]/tot*100)+'%</em></span></div>').join('')+'</div>':'<div style="color:var(--t3);font-size:13px;text-align:center;padding:1.2rem 0">Sem investimentos ainda.</div>');

}
function renderPatrEvo(){
  const el=document.getElementById('patr-evo');if(!el)return;
  const h=D._patrHist||{};
  const keys=Object.keys(h).filter(k=>/^\d{4}-\d{2}$/.test(k)).sort().slice(-8);
  if(keys.length<2){el.innerHTML='<div style="color:var(--t3);font-size:13px;padding:1.2rem 0;text-align:center">Começando a registrar o patrimônio mês a mês — o gráfico aparece quando houver ao menos 2 meses de histórico.</div>';return;}
  const MNs=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
  const S=keys.map(k=>({k,v:h[k],lbl:MNs[+k.slice(5)-1]}));
  const vals=S.map(p=>p.v).concat([0]);
  const min=Math.min(...vals),max=Math.max(...vals),rng=(max-min)||1;
  const W=680,H=180,x0=24,x1=656,yTop=20,yBot=140;
  const X=i=>x0+i*((x1-x0)/(S.length-1)),Yv=v=>yBot-((v-min)/rng)*(yBot-yTop);
  const P=S.map((p,i)=>[X(i),Yv(p.v)]);
  const line=P.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ');
  const zeroY=Yv(0);
  const delta=S[S.length-1].v-S[0].v;
  el.innerHTML='<svg viewBox="0 0 '+W+' '+H+'" width="100%" preserveAspectRatio="xMidYMid meet" style="max-height:200px"><defs><linearGradient id="peg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="var(--g)" stop-opacity=".16"/><stop offset="1" stop-color="var(--g)" stop-opacity="0"/></linearGradient></defs>'
    +(min<0&&max>0?'<line x1="'+x0+'" y1="'+zeroY.toFixed(1)+'" x2="'+x1+'" y2="'+zeroY.toFixed(1)+'" stroke="var(--b)" stroke-dasharray="3 4"/>':'')
    +'<path d="'+line+' L'+P[P.length-1][0].toFixed(1)+','+yBot+' L'+P[0][0].toFixed(1)+','+yBot+' Z" fill="url(#peg)"/>'
    +'<path d="'+line+'" fill="none" stroke="var(--g)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>'
    +S.map((p,i)=>'<circle cx="'+P[i][0].toFixed(1)+'" cy="'+P[i][1].toFixed(1)+'" r="2.5" fill="var(--g)"/>').join('')
    +S.map((p,i)=>'<text x="'+P[i][0].toFixed(1)+'" y="'+(H-8)+'" font-size="9.5" fill="var(--t3)" text-anchor="middle">'+p.lbl+'</text>').join('')
    +'</svg>'
    +'<div style="text-align:center;font-size:12px;color:var(--t2);margin-top:.3rem">Variação no período: <b style="color:'+(delta>=0?'var(--g)':'var(--r)')+'">'+(delta>=0?'+':'−')+fv(Math.abs(delta))+'</b></div>';
}
function renderPatrimonioPage(){
  const container=document.getElementById('page-patrimonio');

  container.innerHTML='';
  const wrap=document.createElement('div');
  wrap.style.cssText='display:flex;flex-direction:column;gap:1.1rem';

  const saldo=saldoAtualMes(), inv=totalInvestimentos(), divRest=totalDividasRestante();
  const patr=saldo+inv-divRest;
  const ativos=inv+Math.max(0,saldo), passivos=divRest+Math.max(0,-saldo);
  const maxAP=Math.max(1,ativos,passivos);

  // captura o retrato do patrimônio deste mês (para a evolução)
  if(!D._patrHist)D._patrHist={};
  const _novoMes=!(mes in D._patrHist);
  D._patrHist[mes]=Math.round(patr);
  if(_novoMes){ try{saveData();}catch(e){} }

  // poupança do mês
  const _rr=rows();
  const _pin=_rr.filter(x=>x.tipo==='in'&&x.status==='pago').reduce((a,x)=>a+x.valor,0);
  const _pout=_rr.filter(x=>x.tipo==='out'&&x.status==='pago').reduce((a,x)=>a+x.valor,0);
  const poup=_pin>0?Math.round((_pin-_pout)/_pin*100):0;

  // HERO: Patrimônio líquido + Poupança + Ativos × Passivos (compacto)
  const hero=document.createElement('div');hero.className='card';
  hero.innerHTML=
    '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;flex-wrap:wrap;margin-bottom:1.1rem">'
      +'<div><div class="nl-eyebrow">Patrimônio líquido</div><div class="tnum" style="font-size:26px;font-weight:800;letter-spacing:-.02em;margin-top:.2rem;color:'+(patr<0?'var(--r)':'var(--t)')+'">'+fv(patr)+'</div></div>'
      +'<div style="text-align:right"><div class="nl-eyebrow">Poupança do mês</div><div style="font-size:26px;font-weight:800;letter-spacing:-.02em;margin-top:.2rem;color:'+(poup>=0?'var(--g)':'var(--r)')+'">'+poup+'%</div></div>'
    +'</div>'
    +'<div style="display:flex;flex-direction:column;gap:.6rem">'
      +'<div><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span style="color:var(--t3)">Ativos <span style="font-size:10.5px">(saldo + investimentos)</span></span><span style="font-weight:700;color:var(--g)">'+fv(ativos)+'</span></div><div style="height:8px;border-radius:5px;background:var(--bg);overflow:hidden"><div style="height:100%;width:'+(ativos/maxAP*100)+'%;background:var(--g);border-radius:5px"></div></div></div>'
      +'<div><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span style="color:var(--t3)">Passivos <span style="font-size:10.5px">(dívidas)</span></span><span style="font-weight:700;color:var(--r)">'+fv(passivos)+'</span></div><div style="height:8px;border-radius:5px;background:var(--bg);overflow:hidden"><div style="height:100%;width:'+(passivos/maxAP*100)+'%;background:var(--r);border-radius:5px"></div></div></div>'
    +'</div>';
  wrap.appendChild(hero);

  // Evolução do patrimônio
  const evoP=document.createElement('div');evoP.className='card';
  evoP.innerHTML='<div class="nl-ch">Evolução do patrimônio <span class="sub">mês a mês</span></div><div id="patr-evo"></div>';
  wrap.appendChild(evoP);

  // METAS: Spin + Imóvel (com aportes e histórico)
  const topSection=document.createElement('div');
  topSection.className='nl-grid2';
  topSection.innerHTML=_metaCard('spin','Spin','🏡')+_metaCard('imovel','Imóvel','🏠');
  wrap.appendChild(topSection);

  // Resumo de dívidas + Alocação de investimentos (lado a lado)
  const row=document.createElement('div');row.className='nl-grid2';
  row.appendChild(_dividasResumoCard());
  row.appendChild(_investAlocCard());
  wrap.appendChild(row);

  // Dívidas parceladas (lista)
  const dividasSection=document.createElement('div');
  dividasSection.className='card';
  dividasSection.innerHTML=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem"><div class="nl-ch" style="margin:0">Dívidas parceladas</div><button onclick="novaDivida()" style="border:none;background:var(--g);color:#fff;padding:.4rem .75rem;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer">+ Nova</button></div><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1rem" id="dividas-list"></div>`;
  wrap.appendChild(dividasSection);

  // Investimentos (lista)
  const investSection=document.createElement('div');
  investSection.className='card';
  investSection.innerHTML=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem"><div class="nl-ch" style="margin:0">Investimentos</div><button onclick="novoInvestimento()" style="border:none;background:var(--g);color:#fff;padding:.4rem .75rem;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer">+ Adicionar</button></div><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:1rem" id="investimentos-list"></div>`;
  wrap.appendChild(investSection);

  container.appendChild(wrap);
  renderDividas();
  renderInvestimentos();
  renderPatrEvo();
}

/* ── MODAL DE FORMULARIO GENERICO (metas, dividas, investimentos) ── */
function _formModal(titulo, campos, onSave){
  const ov=document.createElement('div');
  ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:6000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(2px);padding:1rem';
  const inputs=campos.map(c=>`<label style="display:block;margin-bottom:.85rem">
      <span style="display:block;font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">${c.label}</span>
      <input data-k="${c.key}" type="${c.type||'text'}" value="${(c.value!==undefined&&c.value!==null)?c.value:''}" ${c.type==='number'?'step="0.01"':''} placeholder="${c.ph||''}" style="width:100%;padding:.6rem .7rem;border:1.5px solid var(--b);border-radius:8px;font-size:14px;font-family:Inter,sans-serif;color:var(--t);background:var(--w);outline:none;box-sizing:border-box">
    </label>`).join('');
  ov.innerHTML=`<div style="background:var(--w);border-radius:14px;padding:1.75rem;width:420px;max-width:100%;box-shadow:0 20px 60px rgba(0,0,0,.3);border:1px solid var(--b)">
    <div style="font-size:17px;font-weight:700;color:var(--t);margin-bottom:1.25rem">${titulo}</div>
    ${inputs}
    <div style="display:flex;gap:.6rem;margin-top:.4rem">
      <button data-act="cancel" style="flex:1;padding:.6rem;background:var(--bg);color:var(--t2);border:1.5px solid var(--b);border-radius:8px;font-weight:700;font-size:13px;cursor:pointer;font-family:Inter,sans-serif">Cancelar</button>
      <button data-act="save" style="flex:1;padding:.6rem;background:var(--g);color:#fff;border:none;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer;font-family:Inter,sans-serif">Salvar</button>
    </div>
  </div>`;
  document.body.appendChild(ov);
  const close=()=>ov.remove();
  ov.onclick=e=>{if(e.target===ov)close();};
  ov.querySelector('[data-act=cancel]').onclick=close;
  ov.querySelector('[data-act=save]').onclick=()=>{
    const vals={};
    ov.querySelectorAll('input[data-k]').forEach(inp=>{vals[inp.dataset.k]=inp.type==='number'?(parseFloat(inp.value)||0):inp.value.trim();});
    onSave(vals);close();
  };
  setTimeout(()=>ov.querySelector('input')?.focus(),50);
}

/* ── METAS (Spin / Imovel) ── */
function editarSpin(){ _editMetaDivida('spin','Spin'); }
function editarImovel(){ _editMetaDivida('imovel','Imóvel'); }
/* já pago em R$: se a parcela foi alterada, congela o pago e só as parcelas seguintes usam o novo valor */
function _metaJaPago(d){
  if(!d)return 0;
  if(d.pago_acumulado!=null) return d.pago_acumulado + Math.max(0,_divPagas(d)-(d.pagas_freeze||0))*_divParcela(d);
  return _divPagas(d)*_divParcela(d);
}
function _editMetaDivida(key,nomeLabel){
  const d=_metaDiv(key)||{};
  const oldParcela=_divParcela(d), oldPagas=_divPagas(d);
  _formModal('Editar '+nomeLabel,[
    {label:'Valor Total (R$)',key:'valor_total',type:'number',value:d.valor_total||0},
    {label:'Valor da parcela — vale só p/ as PRÓXIMAS (R$)',key:'parcela_mensal',type:'number',value:oldParcela},
    {label:'Parcelas Pagas',key:'parcelas_pagas',type:'number',value:oldPagas},
    {label:'Total de Parcelas',key:'total_parcelas',type:'number',value:_divTotal(d)}
  ],vals=>{
    if(!D._dividas)D._dividas={};
    const cur=D._dividas[key]||{};
    const jaPagoAntes=_metaJaPago(d);
    D._dividas[key]=Object.assign({id:key,nome:cur.nome||nomeLabel},cur,vals);
    if(+vals.parcela_mensal!==+oldParcela){
      D._dividas[key].pago_acumulado=jaPagoAntes;   // não mexe no que já foi pago
      D._dividas[key].pagas_freeze=oldPagas;         // só as parcelas seguintes usam a nova
    }
    saveData();renderPatrimonioPage();toast(nomeLabel+' atualizado');
  });
}

/* ── DIVIDAS PARCELADAS ── */
function novaDivida(){ _dividaModal(); }
function editarDivida(id){ _dividaModal(id); }
function _dividaModal(id){
  const d=(D._dividas&&D._dividas[id])||{};
  _formModal(id?'Editar Dívida':'Nova Dívida Parcelada',[
    {label:'Nome',key:'nome',type:'text',value:d.nome||''},
    {label:'Valor da Parcela (R$)',key:'parcela_mensal',type:'number',value:_divParcela(d)},
    {label:'Parcelas Pagas',key:'parcelas_pagas',type:'number',value:_divPagas(d)},
    {label:'Total de Parcelas',key:'total_parcelas',type:'number',value:_divTotal(d)}
  ],vals=>{
    if(!D._dividas||Array.isArray(D._dividas))D._dividas={};
    const key=id||('dv_'+Date.now());
    const cur=D._dividas[key]||{};
    const oldParcela=_divParcela(cur), oldPagas=_divPagas(cur), jaPagoAntes=_metaJaPago(cur);
    D._dividas[key]=Object.assign({id:key},cur,vals);
    if(id&&+vals.parcela_mensal!==+oldParcela){
      D._dividas[key].pago_acumulado=jaPagoAntes;
      D._dividas[key].pagas_freeze=oldPagas;
    }
    saveData();renderPatrimonioPage();toast('Dívida salva');
  });
}
function removeDivida(id){ if(confirm('Remover esta dívida?')){ if(D._dividas)delete D._dividas[id]; saveData();renderPatrimonioPage(); } }

    const pt=_divTotal(d), pp=_divPagas(d), pv=_divParcela(d);
    const pct=pt>0?Math.min(100,Math.round(pp/pt*100)):0;
    const restante=Math.max(0,(pt-pp))*pv;
    const rest=Math.max(0,pt-pp);
    const _MN=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
    let quita='quitada';
    if(rest>0){const _p=mes.split('-').map(Number);const _i=(_p[1]-1)+rest;quita=_MN[_i%12]+'/'+(_p[0]+Math.floor(_i/12));}
    return `<div class="card" style="padding:1rem">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:.5rem">
        <div style="font-weight:700;font-size:14px;color:var(--t);min-width:0;overflow:hidden;text-overflow:ellipsis">${d.nome||'Dívida'}</div>
        <div style="display:flex;gap:.4rem;flex-shrink:0">
          <button onclick="editarDivida('${d.id}')" style="border:none;background:none;cursor:pointer;font-size:12px;opacity:.55">✎</button>
          <button onclick="removeDivida('${d.id}')" style="border:none;background:none;cursor:pointer;font-size:12px;opacity:.55;color:var(--r)">✕</button>
        </div>
      </div>
      <div style="font-size:20px;font-weight:800;color:var(--t);margin:.25rem 0 .1rem">${fv(pv)}<span style="font-size:11px;font-weight:400;color:var(--t3)"> /mês</span></div>
      <div style="font-size:11px;color:var(--t3);margin-bottom:.45rem">${pp} de ${pt} parcelas · falta ${fv(restante)} · <b style="color:var(--g)">quita ${quita}</b></div>
      <div style="height:5px;background:var(--bg);border-radius:99px;overflow:hidden"><div style="height:100%;width:${pct}%;background:var(--g);border-radius:99px"></div></div>
    </div>`;
  }).join('');
}

  const dados=meses.map(m=>{
    const rws=(D[m]||[]);
    const inn=rws.filter(r=>r.tipo==='in').reduce((s,r)=>s+(r.valor||0),0);
    const out=rws.filter(r=>r.tipo==='out').reduce((s,r)=>s+(r.valor||0),0);
    return {m,inn,out};
  });
  const max=Math.max(1,...dados.flatMap(d=>[d.inn,d.out]));
  el.style.cssText='background:transparent;padding:.5rem 0';
  el.innerHTML=`<div style="display:flex;align-items:flex-end;justify-content:space-around;gap:.75rem;height:180px;padding:0 .5rem">
    ${dados.map(d=>{
      const hi=Math.round(d.inn/max*150), ho=Math.round(d.out/max*150);
      const lbl=MNs[parseInt(d.m.slice(5),10)-1]+'/'+d.m.slice(2,4);
      return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:.35rem;min-width:0">
        <div style="display:flex;align-items:flex-end;gap:3px;height:150px">
          <div title="Entradas: ${fv(d.inn)}" style="width:15px;height:${hi}px;min-height:2px;background:var(--g);border-radius:4px 4px 0 0"></div>
          <div title="Saídas: ${fv(d.out)}" style="width:15px;height:${ho}px;min-height:2px;background:var(--r);border-radius:4px 4px 0 0"></div>
        </div>
        <div style="font-size:10px;color:var(--t3);font-weight:600">${lbl}</div>
      </div>`;
    }).join('')}
  </div>
  <div style="display:flex;gap:1.25rem;justify-content:center;margin-top:.6rem;font-size:11px;color:var(--t3)">
    <span><span style="display:inline-block;width:10px;height:10px;background:var(--g);border-radius:2px;margin-right:4px"></span>Entradas</span>
    <span><span style="display:inline-block;width:10px;height:10px;background:var(--r);border-radius:2px;margin-right:4px"></span>Saídas</span>
  </div>`;
}

/* ── TABLE DELEGATION (registrada 1x) ── */
function tbDelegate(ev){
  const chip=ev.target.closest('.chip');
  if(chip){ev.stopPropagation();toggleStatus({stopPropagation:()=>{},currentTarget:chip,clientX:ev.clientX,clientY:ev.clientY},chip.dataset.id);return;}
  const ddEl=ev.target.closest('.dd');
  if(ddEl){ev.stopPropagation();editDate({stopPropagation:()=>{},currentTarget:ddEl},ddEl.dataset.id);return;}
  const vd=ev.target.closest('.vd');
  if(vd){ev.stopPropagation();editVal({stopPropagation:()=>{},currentTarget:vd},vd.dataset.id);return;}
  const dn=ev.target.closest('.dn');
  if(dn){ev.stopPropagation();openModal(dn.dataset.id);return;}
  const del=ev.target.closest('.ib.del');
  if(del){ev.stopPropagation();delItem(del.dataset.id);return;}
  if(ev.target.closest('.row-cb'))return;
  if(isMob()){const row=ev.target.closest('[data-id]');if(row&&(row.classList.contains('tr')||row.style.display==='grid')){openModal(row.dataset.id);}}
}

/* ── INIT ── */
async function init(){
  buildSel();

  // Setup layout
  checkLayout();

  // Delegação de eventos - registrada uma única vez
  const tbEl=document.getElementById('tb');if(tbEl)tbEl.addEventListener('click',tbDelegate);
  const tbMEl=document.getElementById('tb-m');if(tbMEl)tbMEl.addEventListener('click',tbDelegate);

  // Responsividade
  window.addEventListener('resize',()=>{checkLayout();render();renderSide();});

  // Autenticação e carregamento de dados
  await checkAuth();
  if(document.getElementById('app-root').style.display!=='none'){
    try{
      await loadFromDB();

      if(isMob()){
        // Mobile: renderizar visão geral por padrão
        render();
        renderSide();
        renderSideGeral();
        const headerEl=document.getElementById('lanc-header-mes');
        if(headerEl)headerEl.textContent=MN[+mes.slice(5)-1];
      } else {
        // Desktop: renderizar abas
        // FIX: não chamar render()/renderSide()/renderSideGeral() aqui.
        // O #tb ainda não existe (é criado dentro de switchPage), então render()
        // estourava TypeError (tb.innerHTML de null), o catch engolia o erro e o
        // switchPage abaixo nunca rodava → tela de Lançamentos em branco.
        // switchPage('lancamentos') já monta o #tb e chama render() internamente.
        switchPage('lancamentos');
        // Pop-up de boas-vindas removido definitivamente a pedido
      }
    }
    catch(e){console.warn('DB:',e?.message||e);}
  }
}
init();
</script>
